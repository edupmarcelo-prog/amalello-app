<script>

// ─── AUTH ────────────────────────────────────────────────────────────────────
let gToken=null, tokenClient=null, userEmail="";
function initAuth(){
  const wait=setInterval(()=>{

      clearInterval(wait);

// ─── API + CACHE ──────────────────────────────────────────────────────────────
const _c={};
async function readSheet(id,range,_att){
  if(!gToken) throw new Error("Não autenticado");
  const k=id+"|"+range, now=Date.now();
  if(_c[k]&&now-_c[k].t<600000) return _c[k].v;
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`,{headers:{Authorization:"Bearer "+gToken}});
  if(res.status===429||res.status===503){
  if((_att||0)<3){await new Promise(r=>setTimeout(r,Math.pow(2,(_att||0)+1)*1500));return readSheet(id,range,(_att||0)+1);}
  throw new Error("Quota excedida. Aguarde e tente novamente.");
}
if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||"Erro "+res.status);}
  const v=(await res.json()).values||[];
  _c[k]={v,t:now};
  return v;
}
async function updateCell(id,range,value){
  if(!gToken) throw new Error("Não autenticado");
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[[value]]})});
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro update");}
}
async function clearSheetRange(id,range){
  if(!gToken) throw new Error("Não autenticado");
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}:clear`,{
    method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:"{}"
  });
  if(!res.ok) throw new Error("Clear failed: "+(await res.text()).slice(0,100));
}
async function updateRow(id,range,values){
  if(!gToken) throw new Error("Não autenticado");
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[values]})});
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro update");}
}
async function appendSheet(id,range,values){
  if(!gToken) throw new Error("Não autenticado");
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,{method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[values]})});
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro append");}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function N(v){if(v===null||v===undefined||v==="")return 0;if(typeof v==="number")return v;const s=String(v).trim().replace(/[R$\s]/g,"");if(!s)return 0;if(s.includes(",")&&s.includes("."))return parseFloat(s.replace(/\./g,"").replace(",","."));if(s.includes(","))return parseFloat(s.replace(",","."));return parseFloat(s)||0;}
const R=v=>`R$\u00a0${N(v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}`;
const P=v=>`${(N(v)*100).toFixed(1)}%`;
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){if(!s||s==="")return "";const st=String(s).trim();if(/^\d{4}-\d{2}-\d{2}/.test(st))return st.slice(0,10);if(/^\d{2}\/\d{2}\/\d{4}/.test(st)){const[d,m,y]=st.split("/");return`${y}-${m}-${d}`;}const mn=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];const mm=st.toLowerCase().match(/(\d{1,2})[\s\-\/]([a-záàãâéêíóôõúü]{3})/);if(mm){const mi=mn.indexOf(mm[2].normalize("NFD").replace(/[\u0300-\u036f]/g,""));if(mi>=0)return`2026-${String(mi+1).padStart(2,"0")}-${mm[1].padStart(2,"0")}`;}const n=+s;if(!isNaN(n)&&n>1000)return new Date((n-25569)*86400*1000).toISOString().slice(0,10);return "";}

// ─── STATE ───────────────────────────────────────────────────────────────────
let S={
  pag:"dashboard",pedidos:[],skus:[],orcamentos:[],lO:false,eO:null,editOrc:null,consig:[],cores:[],resumo:{},filtStatus:"todos",filtAno:"todos",filtMes:"todos",calc:{filamento:0,tempo:0,qtd:1,isChaveiro:false,isIma:false,isMaoObra:false,adicional:0,canal:"direto",marketplace:"mercadolivre",taxaMkt:13,taxaMktCustom:0,imposto:6,embalagem:1.5,envio:0,margemDesejada:50,incImposto:true,incEmbal:true,incCartao:false,precoDesejado:0},

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
let _laRun=false,_lastLA=0;
async function loadAll(force){
  if(_laRun||(!force&&Date.now()-_lastLA<300000))return;
  _laRun=true;
  const sl=document.getElementById("sync-lbl"),st=document.getElementById("sync-time");

    await loadPed();await loadSku();await loadApoio();
    await Promise.all([loadCon(),loadResumo(),loadOrcamentos()]);
  }catch(e){console.warn("loadAll:",e);}
  _lastLA=Date.now();_laRun=false;
  S.att=new Date().toLocaleTimeString("pt-BR");
  if(sl)sl.style.opacity="1";
  if(st)st.textContent=S.att;

async function loadPed(){
  S.lP=true;S.eP=null;render();
  try{
    // Data starts at row 5 (header row 4), so fetch from A4
    const rows=await readSheet(SHEET_ID,"Pedidos!A4:AE");
    if(!rows||rows.length<2){S.pedidos=[];S.lP=false;render();return;}
    // Row 0 = headers (row 4 in sheet), data starts at row 1
    // Cols: A(0)=DataVenda B(1)=Pessoa C(2)=Impressão D(3)=Familia E(4)=Cor
    //       F(5)=Realizado G(6)=Entregue H(7)=Pago I(8)=Check J(9)=DataPag
    //       K(10)=Qtdd L(11)=PrecoUnit M(12)=Valor N(13)=ValorRecebido
    //       ... R(17)=Adicional S(18)=CFG T(19)=... V(21)=CEE W(22)=Dep Z(25)=CustoTotal
    //       AB(27)=Mes AC(28)=Ano
    S.pedidos=rows.slice(1).filter(r=>r&&r.length>1&&r.some(c=>c!=="")).map((r,idx)=>({
      _rowNum: idx+5, // actual sheet row (header=4, data starts=5)
      "Data Venda":r[0]||"",
      Pessoa:r[1]||"",
      "Impressão":r[2]||"",
      Familia:r[3]||"",
      Cor:r[4]||"",
      Realizado:r[5]||"",
      Entregue:r[6]||"",
      Pago:r[7]||"",
      Check:r[8]||"",
      "Data Pag":r[9]||"",
      Qtdd:r[10]||1,
      "Preço unitário":r[11]||0,
      Valor:r[12]||0,
      "Valor Recebido":r[13]||0,
      // cost columns from sheet
      Observacao:r[16]||"",
      Adicional:r[17]||0,
      CFG:r[18]||0,
      CEE:r[21]||0,
      Depreciacao:r[22]||0,
      CustoTotal:r[25]||0,
      Mes:r[27]||"",
      Ano:r[28]||"",
      "Número do Orçamento":r[29]||"",
      "Data Orçamento":r[30]||"",
    }));
    // Sort newest first
    S.pedidos.sort(function(a,b){

let _searchTimer=null;
function onBuscaInput(val){
  S.busca=val;
  if(_searchTimer)clearTimeout(_searchTimer);
  // Save focus state BEFORE the debounce fires (capture now while element still exists)
  var _busca_aid="search-input";
  var _busca_pos=val.length; // cursor at end of typed text
  _searchTimer=setTimeout(function(){
    render();
    // Restore focus and cursor AFTER render recreates the element
    var el=document.getElementById(_busca_aid);
    if(el){
      el.focus();
      try{el.setSelectionRange(_busca_pos,_busca_pos);}catch(e){}
    }
  },180);
}
let _calcTimer=null;
function calcInput(field,val,clear_sku){
  if(clear_sku)S.calc._skuNome="";
  // Normalize decimal separators (comma → dot) for parseFloat
  var normalized=String(val).replace(",",".");
  S.calc[field]=parseFloat(normalized)||0;
  if(_calcTimer)clearTimeout(_calcTimer);
  _calcTimer=setTimeout(function(){
    var aid=document.activeElement?document.activeElement.id:"";
    var apos=(document.activeElement&&document.activeElement.setSelectionRange)?document.activeElement.selectionStart:-1;
    render();
    if(aid){
      var el=document.getElementById(aid);
      if(el){
        el.focus();
        try{
          var len=String(el.value).length;
          var pos=(apos>=0&&apos<=len)?apos:len;
          el.setSelectionRange(pos,pos);
        }catch(e){try{el.select();}catch(e2){}}
      }
    }
  },200);
}

function pgDash(){
  if(S.lP) return load("Carregando pedidos...");
  if(S.eP) return err(S.eP,"loadPed");
  const ped=S.pedidos;
  // CARD1: col M, F=Sim|Não, G=Sim|Não, H=Sim|Não (excluir Lead, Brinde, Consignado)
  const vTotalVendas=ped.filter(p=>["Sim","Não"].includes(p.Realizado)&&["Sim","Não"].includes(p.Entregue)&&["Sim","Não"].includes(p.Pago)).reduce((s,p)=>s+N(p.Valor),0);
  // CARD2: F=Sim, G=Sim|Não, H=Sim → soma col M
  const vRecebido=ped.filter(p=>p.Realizado==="Sim"&&["Sim","Não"].includes(p.Entregue)&&p.Pago==="Sim").reduce((s,p)=>s+N(p.Valor),0);
  // CARD3: realizados entregues não pagos
  const potPeds=ped.filter(p=>p.Realizado==="Sim"&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não");
  const vPot=potPeds.reduce((s,p)=>s+N(p.Valor),0);
  // CARD4: consignação vendida
  const vConsig=S.consig.reduce((s,c)=>s+N(c["Preço AD"])*N(c["Quantidade Vendida"]),0);
  // CARD5: CARD1 + CARD4
  const vSaldo=vTotalVendas+vConsig;
  const totInv=S.resumo.totalInv||TOT_INV;
  const saldo=vSaldo-totInv;
  const pay=Math.min((vSaldo/totInv)*100,100);
  const pos=saldo>=0;
  // Leads count
  const nLeads=ped.filter(p=>p.Realizado==="Lead").length;
  // Action counts
  const aP=ped.filter(p=>p.Realizado==="Não").length;
  const aE=ped.filter(p=>p.Realizado==="Sim"&&p.Entregue==="Não").length;
  const aC=ped.filter(p=>(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não").length;
  // Gráfico: col AB=Mes, AC=Ano, F=Sim, G=Sim|Não, H=Sim → soma col M
  const pm={},mesData={};
  ped.filter(p=>p.Realizado==="Sim"&&["Sim","Não"].includes(p.Entregue)&&p.Pago==="Sim").forEach(p=>{
    const mes=String(p.Mes||"").trim();
    const ano=String(p.Ano||"").trim();
    if(!mes)return;
    const key=mes+"/"+(ano||"2026");
    pm[key]=(pm[key]||0)+N(p.Valor);
    if(!mesData[key])mesData[key]={custo:0,lucro:0};
    const custo=N(p.CustoTotal||0);
    mesData[key].custo+=custo;
    mesData[key].lucro+=Math.max(N(p.Valor)-custo,0);
  });
  const me=Object.entries(pm);
  const mx=Math.max(...me.map(([,v])=>v),1);
  return`
    <h2>Dashboard</h2>
    <p class="sub">${ped.length} pedidos · ${S.att?"Atualizado "+S.att:""}</p>
    <div class="pbbox" style="background:${pos?"#f0fdf4":"#fef2f2"};border-color:${pos?"#bbf7d0":"#fecaca"}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800;font-size:14px;color:${pos?"#15803d":"#b91c1c"}">${pos?"✅ Operação POSITIVA":"⚠️ Operação ainda NEGATIVA"}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px">Investido: ${R(totInv)} · Saldo Final: ${R(vSaldo)} · Resultado: <strong style="color:${pos?"#15803d":"#b91c1c"}">${R(saldo)}</strong></div>
        </div>
        <div style="font-size:22px;font-weight:900;color:${pos?"#15803d":"#b91c1c"}">${pay.toFixed(0)}%</div>
      </div>
      <div class="pbbar"><div class="pbfill" style="width:${pay}%;background:${pos?"#16a34a":"#ef4444"}"></div></div>
      <div style="font-size:11px;color:#9ca3af">Payback: ${pay.toFixed(1)}% do investimento recuperado</div>
    </div>
    <div class="kgrid">
      ${kpi("Valor Total Vendas",R(vTotalVendas),"F=Sim/Não G=Sim/Não H=Sim/Não","#4f46e5")}
      ${kpi("Já Recebido (OK)",R(vRecebido),"F=Sim H=Sim · col M","#16a34a")}
      ${kpi("A Receber (Check)",R(vPot),potPeds.length+" pendentes","#d97706")}
      ${kpi("Consignação (AD)",R(vConsig),"Vendido nos parceiros","#7c3aed")}
      ${kpi("Saldo Final",R(vSaldo),"Vendas + Consignação","#0891b2")}
      ${kpi("Total Investido",R(totInv),"Resumo J4","#ef4444")}
      ${kpi("Custo Médio Grama",R(S.resumo.custoGrama),"Aba Resumo P2","#059669")}
      ${kpi("Custo Médio Chaveiro",R(S.resumo.custoChaveiro),"Aba Resumo P4","#db2777")}
      ${kpi("Custo Médio Imã",R(S.resumo.custoIma),"Aba Resumo P7","#9333ea")}
    </div>
    <div class="acgrid">
      <div class="accard" style="background:#fef2f2"><div class="acnum" style="color:#dc2626">${aP}</div><div class="aclbl" style="color:#dc2626">🖨️ Produzir</div></div>
      <div class="accard" style="background:#fffbeb"><div class="acnum" style="color:#d97706">${aE}</div><div class="aclbl" style="color:#d97706">📦 Entregar</div></div>
      <div class="accard" style="background:#f5f3ff"><div class="acnum" style="color:#7c3aed">${aC}</div><div class="aclbl" style="color:#7c3aed">💸 Cobrar</div></div>
      <div class="accard" style="background:#eff6ff"><div class="acnum" style="color:#2563eb">${nLeads}</div><div class="aclbl" style="color:#2563eb">🎯 Leads</div></div>
    </div>
    ${(()=>{
      if(!me.length) return "";
      let h='<div class="chart"><h3>Faturamento confirmado por mês</h3>';
      h+='<div style="display:flex;align-items:flex-end;gap:10px;height:140px;padding-bottom:4px">';
      me.forEach(([key,total])=>{
        const md=mesData[key]||{custo:0,lucro:0};
        const pctL=total>0?Math.round((md.lucro/total)*100):0;
        const barH=Math.max(Math.round((total/mx)*100),4);
        const hc=total>0?Math.round((md.custo/total)*barH):0;
        const hl=barH-hc;
        h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">';
        h+='<div style="font-size:10px;font-weight:800;color:#16a34a">'+pctL+'%</div>';
        h+='<div style="font-size:9px;color:#9ca3af">'+R(total).replace("R $ ","").replace("R$ ","")+'</div>';
        h+='<div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end">';
        if(hl>0) h+='<div style="width:100%;height:'+hl+'px;background:#16a34a;border-radius:'+(hc>0?'0':'4px')+'px 4px 0 0"></div>';
        if(hc>0) h+='<div style="width:100%;height:'+hc+'px;background:#f87171;border-radius:0 0 4px 4px"></div>';
        h+='</div><div style="font-size:10px;color:#6b7280;text-align:center">'+key.split("/")[0]+'</div></div>';
      });
      h+='</div>';
      h+='<div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:#6b7280;border-top:1px solid #f3f4f6;padding-top:8px">';
      h+='<span><span style="display:inline-block;width:10px;height:10px;background:#16a34a;border-radius:2px;margin-right:3px"></span>Lucro</span>';
      h+='<span><span style="display:inline-block;width:10px;height:10px;background:#f87171;border-radius:2px;margin-right:3px"></span>Custo</span>';
      h+='<span style="margin-left:auto">Total: <strong style="color:#4f46e5">'+R(me.reduce((s,[,v])=>s+v,0))+'</strong></span>';
      h+='</div></div>';
      return h;
    })()}
  `;
}

function getFilPed(filter){
  const b=S.busca.toLowerCase();
  return S.pedidos.filter(p=>{
    const bm=!b||(p.Pessoa||"").toLowerCase().includes(b)||(p["Impressão"]||"").toLowerCase().includes(b);
    if(filter==="produzir") return bm&&p.Realizado==="Não";
    if(filter==="entregar") return bm&&p.Realizado==="Sim"&&p.Entregue==="Não";
    if(filter==="cobrar")   return bm&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não";
    if(filter==="leads")    return bm&&p.Realizado==="Lead";
    // "todos" - apply Status/Ano/Mês filters
    const anoOk=S.filtAno==="todos"||String(p.Ano||"")===S.filtAno;
    const mesOk=S.filtMes==="todos"||String(p.Mes||"")===S.filtMes;
    const stOk=S.filtStatus==="todos"||(
      (S.filtStatus==="produzir"&&p.Realizado==="Não")||
      (S.filtStatus==="entregar"&&p.Realizado==="Sim"&&p.Entregue==="Não")||
      (S.filtStatus==="cobrar"&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não")||
      (S.filtStatus==="leads"&&p.Realizado==="Lead")||
      (S.filtStatus==="ok"&&p.Pago==="Sim"&&p.Entregue==="Sim")
    );
    return bm&&anoOk&&mesOk&&stOk;
  });
}

function openNew(){
  S.editModal={mode:"new",ped:{"Data Venda":today(),Pessoa:"","Impressão":"",Familia:"",Cor:"",Realizado:"Não",Entregue:"Não",Pago:"Não",Qtdd:1,"Preço unitário":0,Valor:0,"Valor Recebido":0}};
  showEditModal();
}
function calcPrecoSugerido(nomeImpressao){
  const sku=S.skus.find(s=>(s["Impressão"]||"")===nomeImpressao);
  if(!sku) return 0;
  const g=N(sku.FilamentoUnitario||0),h=N(sku.TempoemHora||0);
  const tp=sku.Tipo||"";
  const custoG=S.resumo.custoGrama||0.09;
  const tot=g*custoG*1.1+h*0.88+h*1.0+(tp==="Chaveiro"?N(S.resumo.custoChaveiro||0.37):0);
  return parseFloat((tot*2.5).toFixed(2));
}

function openEdit(i,filter){
  const fil=getFilPed(filter||"");
  const b=S.busca.toLowerCase();
  const filb=fil.filter(p=>!b||(p.Pessoa||"").toLowerCase().includes(b)||(p["Impressão"]||"").toLowerCase().includes(b));
  if(!filb[i])return;
  S.editModal={mode:"edit",ped:{...filb[i]}};
  showEditModal();
}

function onProdutoChange(val){
  S.editModal.ped["Impressão"]=val;
  const sku=S.skus.find(s=>(s["Impressão"]||"")===val);
  if(sku){
    S.editModal.ped.Familia=sku.Tipo||"";
    if(!N(S.editModal.ped["Preço unitário"])){
      const preco=calcPrecoSugerido(val);
      S.editModal.ped["Preço unitário"]=preco;
      S.editModal.ped.Valor=preco*(N(S.editModal.ped.Qtdd)||1);
    }
  }
  showEditModal();
}

      S.editModal.ped["Preço unitário"]=preco;
      S.editModal.ped.Valor=preco*(N(S.editModal.ped.Qtdd)||1);
    }

        const ni=document.getElementById("prod-input");

async function salvarPedido(){
  const {mode,ped}=S.editModal;
  if(!ped.Pessoa||!ped["Impressão"]){alert("Preencha cliente e produto.");return;}
  const qtd=N(ped.Qtdd)||1,pr=N(ped["Preço unitário"])||0;
  ped.Valor=qtd*pr;
  if(ped.Pago==="Sim"&&!N(ped["Valor Recebido"])) ped["Valor Recebido"]=ped.Valor;
  const check=(ped.Realizado==="Sim"&&ped.Entregue==="Sim"&&ped.Pago==="Sim")?"OK":"Check";
  try{
    const btn=document.querySelector(".btn-grn");
    if(btn){btn.textContent="Salvando...";btn.disabled=true;}
    if(mode==="new"){
      // Novo pedido: escreve A:L numa linha só, deixando vazio D(Família), I(Check), J(DataPag) — são fórmulas
      // M(Valor) e N(ValorRecebido) também são fórmulas, não precisam ser escritas
      const row=[
        ped["Data Venda"],                    // A - Data Venda
        ped.Pessoa,                            // B - Pessoa
        ped["Impressão"],                      // C - Impressão
        "",                                    // D - Família (FÓRMULA)
        ped.Cor,                               // E - Cor
        ped.Realizado,                         // F - Realizado
        ped.Entregue,                          // G - Entregue
        ped.Pago,                              // H - Pago
        "",                                    // I - Check (FÓRMULA)
        ped.Pago==="Sim"?(ped["Data Pag"]||today()):"",  // J - Data Pag
        qtd,                                   // K - Qtdd
        pr,                                    // L - Preço unitário
      ];
      // 1. Append the new row
      const appendRes = await fetch(
        "https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"/values/"+encodeURIComponent("Pedidos!A:L")+":append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS&includeValuesInResponse=true",
        {method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[row]})}
      );
      const appendData = await appendRes.json();
      // 2. Get the new row number from response
      const updRange = appendData?.updates?.updatedRange||"";
      const newRowMatch = updRange.match(/(\d+)$/);
      if(newRowMatch){
        const newRow = parseInt(newRowMatch[1]);
        const prevRow = newRow - 1;
        // 3. Copy formulas D(Família) and I(Check) from previous row
        async function copyFormCol(col){
          try{
            const fRes=await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"?ranges=Pedidos!"+col+prevRow+"&fields=sheets.data.rowData.values.userEnteredValue",
              {headers:{Authorization:"Bearer "+gToken}});
            const fData=await fRes.json();
            const formula=fData?.sheets?.[0]?.data?.[0]?.rowData?.[0]?.values?.[0]?.userEnteredValue?.formulaValue;
            if(formula){
              await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"/values/"+encodeURIComponent("Pedidos!"+col+newRow)+"?valueInputOption=USER_ENTERED",
                {method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[[formula]]})});
            }
          }catch(e){console.warn("copyFormCol",col,e);}
        }
        await Promise.all([copyFormCol("D"), copyFormCol("I")]);
        // Write Q (Observação) if Custom product
        if((ped["Impressão"]||"").toLowerCase().includes("custom")&&ped.Observacao){
          await updateRow(SHEET_ID,"Pedidos!Q"+newRow,[ped.Observacao||""]);
        }
      }
    }else{
      // Edição: atualiza por blocos individuais, pulando D, I, M, N (fórmulas)
      const rowNum=ped._rowNum;
      if(!rowNum){alert("Erro: número da linha não encontrado.");return;}
      // A:C = Data, Pessoa, Impressão
      await updateRow(SHEET_ID,`Pedidos!A${rowNum}:C${rowNum}`,[ped["Data Venda"],ped.Pessoa,ped["Impressão"]]);
      // E:H = Cor, Realizado, Entregue, Pago (pula D=Família e I=Check)
      await updateRow(SHEET_ID,`Pedidos!E${rowNum}:H${rowNum}`,[ped.Cor,ped.Realizado,ped.Entregue,ped.Pago]);
      // J = Data Pag (apenas se Pago=Sim)
      if(ped.Pago==="Sim"&&(ped["Data Pag"]||"")) await updateRow(SHEET_ID,`Pedidos!J${rowNum}`,[ped["Data Pag"]||today()]);
      // K:L = Qtdd, Preço unitário
      await updateRow(SHEET_ID,`Pedidos!K${rowNum}:L${rowNum}`,[qtd,pr]);
      // Observação col Q (se Custom)
      if((ped["Impressão"]||"").toLowerCase().includes("custom")&&ped.Observacao!==undefined){
        await updateRow(SHEET_ID,`Pedidos!Q${rowNum}`,[ped.Observacao||""]);
      }
      // Write AD:AE (Número Orçamento, Data Orçamento) if present
      if(ped["Número do Orçamento"]||ped["Data Orçamento"]){
        await updateRow(SHEET_ID,`Pedidos!AD${rowNum}:AE${rowNum}`,[ped["Número do Orçamento"]||"",ped["Data Orçamento"]||""]);
      }
      // NÃO escreve: D(Família), I(Check), M(Valor), N(ValorRecebido) — são fórmulas
    }
    // Clear cache for pedidos
    Object.keys(_c).filter(k=>k.includes(SHEET_ID)&&k.includes("Pedidos")).forEach(k=>delete _c[k]);
    closeModal("edit-modal");
    await loadPed();
    alert(mode==="new"?"✅ Pedido inserido na planilha!":"✅ Pedido atualizado na planilha!");
  }catch(e){alert("Erro ao salvar: "+e.message);}
}

// ─── CALCULADORA ─────────────────────────────────────────────────────────────
function pgCalculadora(){
  var v=S.vars||getDefaultVars();
  var calc=S.calc;
  var skuSel=S.skus.find(function(s){return (s["Impressão"]||"")===calc._skuNome;});
  var g=skuSel?N(skuSel.FilamentoUnitario||0):N(calc.filamento||0);
  var h=skuSel?N(skuSel.TempoemHora||0):N(calc.tempo||0);
  var qtd=N(calc.qtd)||1;
  var adicional=N(calc.adicional)||0;
  var isCh=!!calc.isChaveiro, isIma=!!calc.isIma, isMO=!!calc.isMaoObra;
  var cG=S.resumo.custoGrama||0.09, cCh=S.resumo.custoChaveiro||0.37, cIma=S.resumo.custoIma||0.18;
  var CFG=g*cG, TD=CFG*(v.taxaDesp/100), CEE=h*v.taxaEnergia, DEP=h*v.taxaDepreciacao;
  var CHAV=isCh?cCh:0, IMA=isIma?cIma:0;
  var MO=isMO?(CFG+TD+CEE+DEP+CHAV+IMA)*(v.taxaMaoObra/100):0;
  var custoProd=CFG+TD+CEE+DEP+CHAV+IMA+MO+adicional;
  var custoTotal=custoProd*qtd;
  var mgMeta=N(calc.margemDesejada||v.margemPadrao);
  var m=mgMeta/100, imp=(v.impostoVenda||6)/100, cartao=(v.taxaCartao||3.5)/100, fixo=v.custoFixoRateado||0;
  var embalAtivo=calc.incEmbal!==false, impostoAtivo=calc.incImposto!==false, cartaoAtivo=!!calc.incCartao;
  var pd=N(calc.precoDesejado||0);
  var embalVal=embalAtivo?(v.custoEmbalDireto||1.5):0, envioMkt=v.custoEnvioMktplace||15;
  var familias=[...new Set(S.skus.map(function(s){return s.Tipo||"";}).filter(Boolean))].sort();
  var famSel=calc._familia||"";
  var skusFil=(famSel?S.skus.filter(function(s){return(s.Tipo||"")===famSel;}):S.skus).slice().sort(function(a,b){return(a["Impressão"]||"").localeCompare(b["Impressão"]||"");});
  function calcCh(txMkt,embal,envio,useCartao){
    var txC=(useCartao||cartaoAtivo)?cartao:0, txI=impostoAtivo?imp:0, den=1-m-txMkt-txI-txC;
    if(den<=0)return{preco:0,lucro:0};
    var preco=(custoProd+embal+envio+fixo)/den, lucro=preco-custoProd-embal-envio-fixo-(preco*(txMkt+txI+txC));
    return{preco:Math.round(preco*100)/100,lucro:Math.round(lucro*100)/100};
  }
  var canais=[
    {id:"direto", label:"Venda Direta",     icon:"🤝",txMkt:0,                     embal:embalVal,envio:0,       color:"#4f46e5",useCartao:false},
    {id:"cartao", label:"Direto c/ Cartão", icon:"💳",txMkt:0,                     embal:embalVal,envio:0,       color:"#7c3aed",useCartao:true},
    {id:"mliv",   label:"Mercado Livre",     icon:"🛒",txMkt:v.taxaMercadoLivre/100,embal:embalVal,envio:envioMkt,color:"#d97706",useCartao:false},
    {id:"shopee", label:"Shopee",            icon:"🛍️",txMkt:v.taxaShopee/100,      embal:embalVal,envio:envioMkt,color:"#ef4444",useCartao:false},
    {id:"outro",  label:"Outro Marketplace", icon:"🌐",txMkt:v.taxaOutro/100,       embal:embalVal,envio:envioMkt,color:"#059669",useCartao:false},
  ];
  canais.forEach(function(ch){var r=calcCh(ch.txMkt,ch.embal,ch.envio,ch.useCartao);ch.preco=r.preco;ch.lucro=r.lucro;});

  // Build HTML safely
  var H=[];

async function loadOrcamentos(){
  S.lO=true; S.eO=null;
  try{
    var rows=await readSheet(ORC_SHEET_ID,"A2:R");
    if(!rows||rows.length<2){S.orcamentos=[];S.lO=false;render();return;}
    // rows[0]=header(row2), rows[1+]=data rows starting at sheet row 3
    var dataRows=rows.slice(1);
    // Group rows by orçamento number (col E) or date+client fallback
    var orcMap={};
    dataRows.forEach(function(row,ri){
      if(!row||!row[0]) return;
      var dataVal=String(row[0]||"");
      // Skip header/label rows
      if(dataVal==="Data Orçamento"||dataVal==="Celula A1"||dataVal==="Celula A2") return;
      var numero=String(row[4]||"");
      var cliente=String(row[1]||"");
      var key=numero||(dataVal+"_"+cliente);
      if(!key||key==="_") return;
      if(!orcMap[key]){
        orcMap[key]={
          numero:numero, data:dataVal, cliente:cliente,
          celular:String(row[2]||""), instagram:String(row[3]||""),
          items:[], valorTotal:0, custoTotal:0, lucroTotal:0,
          margem:0, markup:0, status:String(row[17]||"Em aberto"),
          _rowNums:[]
        };
      }
      var qtd=N(row[8])||1;
      var valorUn=N(row[9])||0;
      var custoUn=N(row[11])||0;
      var kVal=N(row[10])||0;
      var mVal=N(row[12])||0;
      var oVal=N(row[14])||0;
      orcMap[key].items.push({produto:String(row[5]||""),tipo:String(row[6]||""),
        cor:String(row[7]||""),qtd:qtd,valorUn:valorUn,custoUn:custoUn});
      orcMap[key].valorTotal+=kVal||valorUn*qtd;
      orcMap[key].custoTotal+=mVal||custoUn*qtd;
      orcMap[key].lucroTotal+=oVal||(valorUn-custoUn)*qtd;
      orcMap[key]._rowNums.push(ri+3); // sheet row: range starts at row2, +1 for header, +ri
    });
    S.orcamentos=Object.values(orcMap).filter(function(o){return o.cliente;});
    S.orcamentos.forEach(function(o){
      o.margem=o.valorTotal>0?(o.lucroTotal/o.valorTotal)*100:0;
      o.markup=o.custoTotal>0?o.valorTotal/o.custoTotal:0;
    });
    S.orcamentos.sort(function(a,b){return b.numero.localeCompare(a.numero);});
  }catch(e){S.eO=e.message||String(e);}
  S.lO=false; render();
}
function gerarNumOrc(clienteNome){
  var now=new Date();
  var y=now.getFullYear();
  var m=String(now.getMonth()+1).padStart(2,"0");
  var d=String(now.getDate()).padStart(2,"0");
  var primeiro=(clienteNome||"Cliente").split(" ")[0];
  return ""+y+m+d+primeiro;
}

function calcTotaisOrc(orc){
  var v=S.vars||getDefaultVars();
  var isCredito=(orc.formaPag||"pix")==="credito";
  var isImposto=(orc.imposto||"Não")==="Sim";
  var txCartao=isCredito?(v.taxaCartao||3.5)/100:0;
  var txImposto=isImposto?(v.impostoVenda||6)/100:0;
  var extra=txCartao+txImposto;
  var valorTotal=0, custoTotal=0, lucroTotal=0;
  (orc.items||[]).forEach(function(it){
    var qtd=N(it.qtd)||1;
    var vUn=N(it.valorUn)||0;
    var cUn=N(it.custoUn)||0;
    var cUnAdj=cUn*(1+extra);
    valorTotal+=vUn*qtd;
    custoTotal+=cUnAdj*qtd;
    lucroTotal+=(vUn-cUnAdj)*qtd;
  });
  valorTotal+=N(orc.frete)||0;
  var margem=valorTotal>0?(lucroTotal/valorTotal)*100:0;
  var markup=custoTotal>0?valorTotal/custoTotal:0;
  return{valorTotal:valorTotal,custoTotal:custoTotal,lucroTotal:lucroTotal,margem:margem,markup:markup};
}

function closeOrcModal(){
  var overlay=document.getElementById("orc-overlay");
  if(overlay) overlay.innerHTML="";
  S.editOrc=null;
}

function flushOrcInputs(){
  if(!S.editOrc) return;
  (S.editOrc.items||[]).forEach(function(it,i){
    var q=document.getElementById("orc-qty-"+i); if(q) it.qtd=+q.value||1;
    var v=document.getElementById("orc-vun-"+i); if(v) it.valorUn=parseFloat(v.value)||0;
    var cu=document.getElementById("orc-cun-"+i); if(cu) it.custoUn=parseFloat(cu.value)||0;
    var p=document.getElementById("orc-prod-"+i); if(p) it.produto=p.value;
    var r=document.getElementById("orc-cor-"+i); if(r) it.cor=r.value;
  });
  var f=document.getElementById("orc-frete"); if(f) S.editOrc.frete=parseFloat(f.value)||0;
  clearTimeout(window._ot);
}
function addItemOrc(){
  if(!S.editOrc) return;
  flushOrcInputs();
  S.editOrc.items.push({produto:"",tipo:"",cor:"",qtd:1,valorUn:0,custoUn:0});
  renderOrcModal();
}

function removeItemOrc(i){
  if(!S.editOrc) return;
  flushOrcInputs();
  S.editOrc.items.splice(i,1);
  renderOrcModal();
}

function onOrcProdInput(i,val){
  if(!S.editOrc||!S.editOrc.items||isNaN(i)) return;
  S.editOrc.items[i].produto=val;
  var sku=S.skus.find(function(s){return(s['Impressão']||'')==val;});
  if(sku) onOrcProdChange(i,val);
}
function onOrcProdChange(i,nome){
  if(!S.editOrc) return;
  var sku=S.skus.find(function(s){return(s["Impressão"]||"")===nome;});
  S.editOrc.items[i].produto=nome;
  if(sku){
    S.editOrc.items[i].tipo=sku.Tipo||"";
    // Suggest cost from calc
    var v=S.vars||getDefaultVars();
    var g=N(sku.FilamentoUnitario)||0, h=N(sku.TempoemHora)||0;
    var cG=S.resumo.custoGrama||0.09;
    var CFG=g*cG, TD=CFG*(v.taxaDesp/100), CEE=h*v.taxaEnergia, DEP=h*v.taxaDepreciacao;
    var isCh=(sku.Tipo||"").toLowerCase()==="chaveiro";
    var CHAV=isCh?(S.resumo.custoChaveiro||0.37):0;
    S.editOrc.items[i].custoUn=Math.round((CFG+TD+CEE+DEP+CHAV)*100)/100;
    if(!S.editOrc.items[i].valorUn){
      S.editOrc.items[i].valorUn=Math.round(S.editOrc.items[i].custoUn*2.5*100)/100;
    }
  }
  renderOrcModal();
}

async function salvarOrcamento(){
  var orc=S.editOrc;
  if(!orc||!orc.cliente){alert("Preencha o nome do cliente.");return;}
  var validItems=(orc.items||[]).filter(function(it){return it.produto;});
  if(!validItems.length){alert("Adicione pelo menos um produto.");return;}

  var v=S.vars||getDefaultVars();
  var isCredito=(orc.formaPag||"pix")==="credito";
  var isImposto=(orc.imposto||"Não")==="Sim";
  var txCartao=isCredito?(v.taxaCartao||3.5)/100:0;
  var txImposto=isImposto?(v.impostoVenda||6)/100:0;

  // Instagram: add @ if missing
  var instagram=String(orc.instagram||"").trim();
  if(instagram&&!instagram.startsWith("@")) instagram="@"+instagram;

  // Date: convert YYYY-MM-DD → DD/MM/YYYY
  var dataStr=orc.data||today();
  if(dataStr.includes("-")){
    var dp=dataStr.split("-");
    if(dp.length===3) dataStr=dp[2]+"/"+dp[1]+"/"+dp[0];
  }

  // Orçamento number: use existing or generate
  var numero=orc.numero||gerarNumOrc(orc.cliente);
  var statusFinal=orc.status||"Em aberto";

  // Build one row per item
  var rows=[];
  validItems.forEach(function(it){
    var qtd=N(it.qtd)||1;
    var valorUn=Math.round((N(it.valorUn)||0)*100)/100;
    var custoBase=Math.round((N(it.custoUn)||0)*100)/100;
    var custoAdj=Math.round(custoBase*(1+txCartao+txImposto)*100)/100;
    var valorTotal=Math.round(valorUn*qtd*100)/100;
    var custoTotal=Math.round(custoAdj*qtd*100)/100;
    var lucroUn=Math.round((valorUn-custoAdj)*100)/100;
    var lucroTotal=Math.round(lucroUn*qtd*100)/100;
    var margem=valorUn>0?Math.round((lucroUn/valorUn)*10000)/100:0;
    var markup=custoAdj>0?Math.round((valorUn/custoAdj)*100)/100:0;
    rows.push([
      dataStr,          // A Data Orçamento
      orc.cliente||"", // B Pessoa
      orc.celular||"", // C Celular
      instagram,        // D Instagram
      numero,           // E Número Orçamento
      it.produto||"",  // F Impressão
      it.tipo||"",     // G Familia
      it.cor||"",      // H Cor
      qtd,              // I Quantidade
      valorUn,          // J Valor Unitário
      valorTotal,       // K Valor Total
      custoAdj,         // L Custo Unitário (ajustado por cartão/imposto)
      custoTotal,       // M Custo Total
      lucroUn,          // N Lucro Unitário
      lucroTotal,       // O Lucro Total
      margem+"%",       // P Margem de Lucro
      markup,           // Q Markup
      statusFinal       // R Status
    ]);
  });

  try{
    var oldRowNums=orc._rowNums||[];
    var numOld=oldRowNums.length;
    var numNew=rows.length;

    if(numOld>0){
      // EDIT: overwrite existing rows IN-PLACE (no blank rows created)
      var toUpdate=Math.min(numOld,numNew);
      for(var i=0;i<toUpdate;i++){
        await updateRow(ORC_SHEET_ID,"A"+oldRowNums[i]+":R"+oldRowNums[i],rows[i]);
      }
      // Extra new items (user added items): append
      for(var i=toUpdate;i<numNew;i++){
        await appendSheet(ORC_SHEET_ID,"A:R",rows[i]);
      }
      // Excess old rows (user removed items): clear them truly
      for(var i=toUpdate;i<numOld;i++){
        await clearSheetRange(ORC_SHEET_ID,"A"+oldRowNums[i]+":R"+oldRowNums[i]);
      }
    } else {
      // NEW orçamento: just append
      for(var i=0;i<rows.length;i++){
        await appendSheet(ORC_SHEET_ID,"A:R",rows[i]);
      }
    }
    alert("Orçamento "+numero+" salvo!");
    closeOrcModal();
    await loadOrcamentos();
  }catch(e){alert("Erro ao salvar: "+e.message);}
}

function pgOrcamentos(){
  if(S.lO) return '<div style="padding:40px;text-align:center"><div class="spinner"></div><p>Carregando orçamentos...</p></div>';
  var orcs=S.orcamentos||[];
  var bq=S.busca.toLowerCase();
  var filtered=bq?orcs.filter(function(o){
    return (o.cliente||"").toLowerCase().includes(bq)||(o.numero||"").toLowerCase().includes(bq)||
           (o.items||[]).some(function(it){return(it.produto||"").toLowerCase().includes(bq);});
  }):orcs;

  var H=[];
  var a=function(s){H.push(s);};
  a('<h2>📋 Orçamentos</h2>');
  a('<p class="sub">'+filtered.length+' orçamento(s)</p>');
  a('<div class="sbar">');
  a('<input id="search-input" class="sinp" placeholder="Buscar por cliente, produto ou nº orçamento..." value="'+S.busca+'" oninput="onBuscaInput(this.value)"/>');
  a('<button onclick="openOrcamento(null)" style="padding:10px 18px;border-radius:9px;border:none;background:#059669;color:#fff;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;font-size:13px">📋 + Novo Orçamento</button>');
  a('</div>');

  if(!filtered.length){
    a('<div style="text-align:center;padding:48px;color:#9ca3af">');
    a('<div style="font-size:40px;margin-bottom:12px">📋</div>');
    a('<div style="font-weight:700">Nenhum orçamento encontrado</div>');
    a('</div>');
    return H.join("");
  }

  a('<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">');
  a('<thead><tr style="background:#f9fafb">');
  ['Nº Orçamento','Data','Cliente','Qtd Itens','Valor Total','Custo Total','Lucro Total','Margem','Status','Ações'].forEach(function(h){
    a('<th style="padding:8px 10px;text-align:left;color:#374151;font-weight:700;white-space:nowrap">'+h+'</th>');
  });
  a('</tr></thead><tbody>');

  filtered.forEach(function(orc,i){
    var mgColor=orc.margem>=30?"#16a34a":orc.margem>=15?"#d97706":"#ef4444";
    var stColor=orc.status==="Convertido em pedido"?"#16a34a":orc.status==="Perdido"?"#ef4444":"#d97706";
    a('<tr style="border-top:1px solid #f3f4f6">');
    a('<td style="padding:8px 10px;font-weight:700;color:#4f46e5">'+orc.numero+'</td>');
    a('<td style="color:#6b7280">'+orc.data+'</td>');
    a('<td style="font-weight:600">'+orc.cliente+'</td>');
    a('<td style="text-align:center">'+(orc.items||[]).length+'</td>');
    a('<td style="font-weight:800;color:#4f46e5">'+R(orc.valorTotal)+'</td>');
    a('<td style="color:#ef4444">'+R(orc.custoTotal)+'</td>');
    a('<td style="color:'+(orc.lucroTotal>=0?"#16a34a":"#ef4444")+'">'+R(orc.lucroTotal)+'</td>');
    a('<td style="font-weight:700;color:'+mgColor+'">'+Number(orc.margem||0).toFixed(1)+'%</td>');
    a('<td><span style="padding:3px 8px;border-radius:5px;background:'+stColor+'1a;color:'+stColor+';font-weight:700;font-size:11px">'+orc.status+'</span></td>');
    a('<td style="white-space:nowrap">');
    a('<button onclick="openOrcamento(S.orcamentos['+i+'])" style="padding:4px 8px;border-radius:5px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:11px;margin-right:3px">✏️ Editar</button>');
    a('<button onclick="converterOrcPed('+i+')" style="padding:4px 8px;border-radius:5px;border:none;background:#4f46e5;color:#fff;cursor:pointer;font-size:11px;margin-right:3px">➡️ Pedido</button>');
    a('<button onclick="marcarOrcPerdido('+i+')" style="padding:4px 8px;border-radius:5px;border:none;background:#fee2e2;color:#ef4444;cursor:pointer;font-size:11px;margin-right:3px">❌ Perdido</button>');
    a('<button onclick="clonarOrc('+i+')" style="padding:4px 8px;border-radius:5px;border:none;background:#f3f4f6;color:#374151;cursor:pointer;font-size:11px">📋 Clonar</button>');
    a('</td>');
    a('</tr>');
    // Expand items detail
    a('<tr style="border-top:none"><td colspan="10" style="padding:0 10px 8px;color:#6b7280;font-size:11px">');
    (orc.items||[]).forEach(function(it){
      a('<span style="margin-right:12px">'+it.produto+(it.cor?" · "+it.cor:"")+' × '+it.qtd+'</span>');
    });
    a('</td></tr>');
  });
  a('</tbody></table></div>');
  return H.join("");
}

async function converterOrcPed(i){
  var orc=S.orcamentos[i];
  if(!orc) return;
  if(orc.status==="Convertido"){alert("Este orçamento #"+orc.numero+" já foi convertido em pedido.");return;}
  S.convModal={orc:orc,idx:i,realizado:"Não",entregue:"Não",pago:"Não"};
  renderConvModal();
}

function renderConvModal(){
  var cm=S.convModal; if(!cm) return;
  var orc=cm.orc;
  var H=[]; var a=function(s){H.push(s);};
  a('<div class="modal-overlay" onclick="if(event.target===this)closeConvModal()">');
  a('<div class="modal" style="max-width:580px;width:95%;max-height:88vh;overflow-y:auto">');
  a('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">');
  a('<h2 style="margin:0;font-size:18px">➡️ Converter em Pedido</h2>');
  a('<button onclick="closeConvModal()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#6b7280">✕</button>');
  a('</div>');
  // Orçamento summary
  a('<div style="background:#eff6ff;border-radius:10px;padding:12px;margin-bottom:14px;border:1px solid #bfdbfe">');
  a('<div style="font-weight:700;color:#1d4ed8;margin-bottom:4px">📋 '+orc.numero+'</div>');
  a('<div style="font-size:12px;color:#374151"><b>Cliente:</b> '+orc.cliente+' · <b>Data:</b> '+orc.data+'</div>');
  a('<div style="margin-top:8px">');
  (orc.items||[]).filter(function(it){return it.produto;}).forEach(function(it,k){
    a('<div style="font-size:12px;padding:5px 0;border-bottom:1px solid #dbeafe;display:flex;justify-content:space-between">');
    a('<span><b>'+(k+1)+'.</b> '+it.produto+(it.cor?' · <em>'+it.cor+'</em>':'')+'</span>');
    a('<span style="color:#1d4ed8">× '+it.qtd+' &nbsp; R$ '+(it.valorUn||0).toFixed(2)+'</span>');
    a('</div>');
  });
  a('</div></div>');
  // Status fields
  a('<p style="font-size:12px;color:#6b7280;margin:0 0 10px">Defina o status inicial para <b>todos os '+((orc.items||[]).filter(function(it){return it.produto;}).length)+'</b> pedido(s):</p>');
  a('<div class="fgrid" style="margin-bottom:16px">');
  ['realizado','entregue','pago'].forEach(function(field){
    var label=field.charAt(0).toUpperCase()+field.slice(1);
    a('<div><label class="flbl">'+label+'</label>');
    a('<select class="fsel" onchange="S.convModal.'+field+'=this.value">');
    ['Não','Sim'].forEach(function(v){a('<option value="'+v+'"'+(cm[field]===v?' selected':'')+'>'+v+'</option>');});
    a('</select></div>');
  });
  a('</div>');
  a('<div style="display:flex;gap:8px;justify-content:flex-end">');
  a('<button onclick="closeConvModal()" style="padding:10px 18px;border-radius:9px;border:1px solid #e5e7eb;background:#fff;color:#374151;font-weight:700;cursor:pointer;font-family:inherit">Fechar</button>');
  a('<button id="btn-conv" onclick="executarConversao()" style="padding:10px 22px;border-radius:9px;border:none;background:#4f46e5;color:#fff;font-weight:800;cursor:pointer;font-family:inherit">➡️ Converter em Pedido</button>');
  a('</div></div></div>');
  var ov=document.getElementById("conv-overlay");
  if(!ov){ov=document.createElement("div");ov.id="conv-overlay";document.body.appendChild(ov);}
  ov.innerHTML=H.join("");
}

function closeConvModal(){
  var ov=document.getElementById("conv-overlay");
  if(ov) ov.innerHTML="";
  S.convModal=null;
}

async function executarConversao(){
  var cm=S.convModal; if(!cm) return;
  var orc=cm.orc;
  var items=(orc.items||[]).filter(function(it){return it.produto;});
  if(!items.length){alert("Nenhum produto no orçamento.");return;}
  var btn=document.getElementById("btn-conv");
  if(btn){btn.textContent="Convertendo...";btn.disabled=true;}
  try{
    var dataVenda=today();
    for(var ii=0;ii<items.length;ii++){
      var it=items[ii];
      var qtd=it.qtd||1;
      var pr=it.valorUn||0;
      var row=[
        dataVenda,                                   // A Data Venda
        orc.cliente,                                 // B Pessoa
        it.produto,                                  // C Impressão
        "",                                          // D Família (FÓRMULA)
        it.cor||"",                                  // E Cor
        cm.realizado,                                // F Realizado
        cm.entregue,                                 // G Entregue
        cm.pago,                                     // H Pago
        "",                                          // I Check (FÓRMULA)
        cm.pago==="Sim"?dataVenda:"",               // J Data Pag
        qtd,                                         // L=12th Qtdd... wait
        pr                                           // L Preço unitário
      ];
      // Append A:L
      var res=await fetch(
        "https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"/values/"+encodeURIComponent("Pedidos!A:L")+":append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS&includeValuesInResponse=true",
        {method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[row]})}
      );
      var data=await res.json();
      var updRange=data?.updates?.updatedRange||"";
      var m=updRange.match(/(\d+)$/);
      if(!m) throw new Error("Não foi possível obter o número da linha inserida (item "+(ii+1)+").");
      var newRow=parseInt(m[1]);
      var prevRow=newRow-1;
      // Copy formulas D (Família) and I (Check) from previous row
      async function copyFC(col){
        try{
          var fr=await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"?ranges="+encodeURIComponent("Pedidos!"+col+prevRow)+"&fields=sheets.data.rowData.values.userEnteredValue",
            {headers:{Authorization:"Bearer "+gToken}});
          var fd=await fr.json();
          var form=fd?.sheets?.[0]?.data?.[0]?.rowData?.[0]?.values?.[0]?.userEnteredValue?.formulaValue;
          if(form){
            await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"/values/"+encodeURIComponent("Pedidos!"+col+newRow)+"?valueInputOption=USER_ENTERED",
              {method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[[form]]})});
          }
        }catch(e){console.warn("copyFC",col,e);}
      }
      await Promise.all([copyFC("D"),copyFC("I")]);
      // Write AD:AE (Número Orçamento, Data Orçamento)
      await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"/values/"+encodeURIComponent("Pedidos!AD"+newRow+":AE"+newRow)+"?valueInputOption=USER_ENTERED",
        {method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[[orc.numero,orc.data]]})});
    }
    // Mark orçamento as Convertido
    await salvarStatusOrc(cm.idx,"Convertido");
    Object.keys(_c).filter(function(k){return k.includes(SHEET_ID)&&k.includes("Pedidos");}).forEach(function(k){delete _c[k];});
    alert("✅ "+items.length+" pedido(s) inserido(s) com sucesso!");
    closeConvModal();
    await loadPed();
    go("pedidos");
  }catch(e){
    if(btn){btn.textContent="➡️ Converter em Pedido";btn.disabled=false;}
    alert("Erro ao converter: "+e.message);
  }
}

async function marcarOrcPerdido(i){
  var orc=S.orcamentos[i];
  if(!orc) return;
  if(!confirm("Marcar orçamento como perdido?")) return;
  orc.status="Perdido";
  await salvarStatusOrc(i,"Perdido");
}

async function salvarStatusOrc(i,status){
  var orc=S.orcamentos[i];
  if(!orc) return;
  try{
    if(orc._rowNums&&orc._rowNums.length>0){
      for(var rr=0;rr<orc._rowNums.length;rr++){
        await updateRow(ORC_SHEET_ID,"R"+orc._rowNums[rr],[status]);
      }
    }
    orc.status=status;
  }catch(e){alert("Erro status: "+e.message);}
  render();
}


function clonarOrc(i){
  var orig=S.orcamentos[i];
  if(!orig) return;
  var clone=JSON.parse(JSON.stringify(orig));
  clone._rowNums=[];
  clone.numero=gerarNumOrc(orig.cliente+"clone");
  clone.data=today();
  clone.status="Em aberto";
  clone.cliente=orig.cliente+"_clone";
  S.editOrc=clone;
  renderOrcModal();
}

showLogin();
initAuth();
