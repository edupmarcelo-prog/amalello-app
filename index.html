<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CLIENT_ID = "967483167289-m1ctc3ti8o12btnn44h63c94or34570d.apps.googleusercontent.com";
const API_KEY   = "AIzaSyALhdkEqgIVaW9wbWRpyDnB0ZEV2BFyrds";
const SCOPES    = "https://www.googleapis.com/auth/spreadsheets";
const SHEET_ID  = "1BxrGwTV535hTLv0ibZCOKYYLd7ge7bES_oy8yim7E6Y";
const SKU_ID    = "1IUntgKC3UazaysvsylAAikdUxkfWV6lEGGfBNNdvIlo";
const PARC_DEFAULT = {
  "Planet Kids Hair":"1-J32HhuPd0b3H8mKgkuB0APblydt8CwV0R82XECUoZU",
  "Ateliê Telma":"1ZvloqW_edvgSLBp-5065D_c7XFElB9NEeQJra8NXCOA",
  "Bomboniere Lucia":"19ucXwNDz_x2yrrciinau6byMT-YLwmCfq6wnwr783N8",
  "Loja Big Net":"1qVLvSQ2OiRE7VAhlz8uVb44FIiekDuDn2Fjd1cOKNVA",
  "Zancapel":"1deStJmPAjBJhXoyh4qNtLXul_MCKbKAggVOzTEqRO6k"
};
const INVEST = {Equipamentos:6500,Instrumentos:251.03,Insumos:478.31,Filamentos:3803.06};
const TOT_INV = Object.values(INVEST).reduce((a,b)=>a+b,0);
const COR_TIPO = {Chaveiro:"#7c3aed",Caixa:"#d97706",Vaso:"#059669",Utilidade:"#2563eb",Fidget:"#db2777","Estátua":"#9333ea",Brinquedo:"#dc2626",Letreiro:"#0891b2",Outros:"#6b7280",Enfeite:"#16a34a"};
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ─── AUTH ────────────────────────────────────────────────────────────────────
let gToken=null, tokenClient=null, userEmail="";
function initAuth(){
  const wait=setInterval(()=>{
    if(window.google&&window.google.accounts){
      clearInterval(wait);
      tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID, scope:SCOPES,
        callback:async resp=>{
          if(resp.error){showLogin();return;}
          gToken=resp.access_token;
          userEmail="edupmarcelo@gmail.com";
          showApp();
        }
      });
    }
  },100);
  setTimeout(()=>clearInterval(wait),10000);
}
function doLogin(){if(!tokenClient){setTimeout(doLogin,300);return;}tokenClient.requestAccessToken({prompt:"select_account"});}

// ─── API + CACHE ──────────────────────────────────────────────────────────────
const _c={};
async function readSheet(id,range){
  if(!gToken) throw new Error("Não autenticado");
  const k=id+"|"+range, now=Date.now();
  if(_c[k]&&now-_c[k].t<120000) return _c[k].v;
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`,{headers:{Authorization:"Bearer "+gToken}});
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro "+res.status);}
  const v=(await res.json()).values||[];
  _c[k]={v,t:now};
  return v;
}
async function updateCell(id,range,value){
  if(!gToken) throw new Error("Não autenticado");
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[[value]]})});
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro update");}
}
async function updateRow(id,range,values){
  if(!gToken) throw new Error("Não autenticado");
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[values]})});
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro update");}
}
async function appendSheet(id,range,values){
  if(!gToken) throw new Error("Não autenticado");
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,{method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[values]})});
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro append");}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function N(v){if(v===null||v===undefined||v==="")return 0;if(typeof v==="number")return v;const s=String(v).trim().replace(/[R$\s]/g,"");if(!s)return 0;if(s.includes(",")&&s.includes("."))return parseFloat(s.replace(/\./g,"").replace(",","."));if(s.includes(","))return parseFloat(s.replace(",","."));return parseFloat(s)||0;}
const R=v=>`R$\u00a0${N(v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}`;
const P=v=>`${(N(v)*100).toFixed(1)}%`;
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){if(!s||s==="")return "";const st=String(s).trim();if(/^\d{4}-\d{2}-\d{2}/.test(st))return st.slice(0,10);if(/^\d{2}\/\d{2}\/\d{4}/.test(st)){const[d,m,y]=st.split("/");return`${y}-${m}-${d}`;}const mn=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];const mm=st.toLowerCase().match(/(\d{1,2})[\s\-\/]([a-záàãâéêíóôõúü]{3})/);if(mm){const mi=mn.indexOf(mm[2].normalize("NFD").replace(/[\u0300-\u036f]/g,""));if(mi>=0)return`2026-${String(mi+1).padStart(2,"0")}-${mm[1].padStart(2,"0")}`;}const n=+s;if(!isNaN(n)&&n>1000)return new Date((n-25569)*86400*1000).toISOString().slice(0,10);return "";}

// ─── STATE ───────────────────────────────────────────────────────────────────
let S={
  pag:"dashboard",pedidos:[],skus:[],consig:[],cores:[],resumo:{},
  lP:false,lS:false,lC:false,eP:null,eS:null,eC:null,
  att:null,busca:"",parcSel:"Planet Kids Hair",
  tipoSel:"todos",consigSel:"todos",
  editModal:null,detModal:null,
  parceiros:{...PARC_DEFAULT}
};

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadAll(){Object.keys(_c).forEach(k=>delete _c[k]);await Promise.all([loadPed(),loadSku(),loadCon(),loadApoio(),loadResumo()]);}

async function loadPed(){
  S.lP=true;S.eP=null;render();
  try{
    // Data starts at row 5 (header row 4), so fetch from A4
    const rows=await readSheet(SHEET_ID,"Pedidos!A4:AC");
    if(!rows||rows.length<2){S.pedidos=[];S.lP=false;render();return;}
    // Row 0 = headers (row 4 in sheet), data starts at row 1
    // Cols: A(0)=DataVenda B(1)=Pessoa C(2)=Impressão D(3)=Familia E(4)=Cor
    //       F(5)=Realizado G(6)=Entregue H(7)=Pago I(8)=Check J(9)=DataPag
    //       K(10)=Qtdd L(11)=PrecoUnit M(12)=Valor N(13)=ValorRecebido
    //       ... R(17)=Adicional S(18)=CFG T(19)=... V(21)=CEE W(22)=Dep Z(25)=CustoTotal
    //       AB(27)=Mes AC(28)=Ano
    S.pedidos=rows.slice(1).filter(r=>r&&r.length>1&&r.some(c=>c!=="")).map((r,idx)=>({
      _rowNum: idx+5, // actual sheet row (header=4, data starts=5)
      "Data Venda":r[0]||"",
      Pessoa:r[1]||"",
      "Impressão":r[2]||"",
      Familia:r[3]||"",
      Cor:r[4]||"",
      Realizado:r[5]||"",
      Entregue:r[6]||"",
      Pago:r[7]||"",
      Check:r[8]||"",
      "Data Pag":r[9]||"",
      Qtdd:r[10]||1,
      "Preço unitário":r[11]||0,
      Valor:r[12]||0,
      "Valor Recebido":r[13]||0,
      // cost columns from sheet
      Observacao:r[16]||"",
      Adicional:r[17]||0,
      CFG:r[18]||0,
      CEE:r[21]||0,
      Depreciacao:r[22]||0,
      CustoTotal:r[25]||0,
      Mes:r[27]||"",
      Ano:r[28]||"",
    }));
    S.att=new Date().toLocaleTimeString("pt-BR");
  }catch(e){S.eP=e.message||String(e);}
  S.lP=false;render();
}

async function loadSku(){
  S.lS=true;S.eS=null;
  try{
    const rows=await readSheet(SKU_ID,"Controle de Skus!A:G");
    if(!rows||rows.length<2){S.skus=[];S.lS=false;return;}
    S.skus=rows.slice(1).filter(r=>r&&r.some(c=>c!=="")).map(r=>({
      Codigo:r[0]||"","Impressão":r[1]||"",FilamentoUnitario:r[2]||0,TempoemHora:r[3]||0,Tipo:r[4]||"","Link Maker ":r[5]||"",Foto:r[6]||""
    }));
  }catch(e){S.eS=e.message||String(e);}
  S.lS=false;
}

async function loadCon(){
  S.lC=true;S.eC=null;render();
  try{
    let rows=null;
    for(const tab of ["Consignado","Consignação","consignado","Sheet1"]){
      try{const r=await readSheet(SHEET_ID,tab+"!A:M");if(r&&r.length>1){rows=r;break;}}catch(e2){}
    }
    if(!rows||rows.length<2){S.consig=[];S.lC=false;render();return;}
    const h=rows[0].map(x=>String(x).trim().toLowerCase());
    const ci=(ns)=>{for(const n of ns){const i=h.findIndex(x=>x.includes(n));if(i>=0)return i;}return -1;};
    const iL=ci(["local","parceiro"])>=0?ci(["local","parceiro"]):0;
    const iI=ci(["impres","produto"])>=0?ci(["impres","produto"]):1;
    const iC=ci(["cor"])>=0?ci(["cor"]):2;
    const iQ=ci(["quantidade","qtd initial","qtd inic"])>=0?ci(["quantidade","qtd initial","qtd inic"]):3;
    const iPA=ci(["preço ad","preco ad"," ad"])>=0?ci(["preço ad","preco ad"," ad"]):4;
    const iPS=ci(["sugerido"])>=0?ci(["sugerido"]):5;
    const iV=ci(["vendida","vendido","qt vend","qtd vend","vend"])>=0?ci(["vendida","vendido","qt vend","qtd vend","vend"]):6;
    const iE=ci(["estoque","estq","saldo"])>=0?ci(["estoque","estq","saldo"]):7;
    S.consig=rows.slice(1).filter(r=>r&&r.length>2&&r.some(c=>c!=="")).map(r=>({
      Local:r[iL]||"","Impressão":r[iI]||"",Cor:r[iC]||"",
      Quantidade:Math.round(N(iQ>=0?r[iQ]:0)),
      "Preço AD":N(iPA>=0?r[iPA]:0),
      "Preço Sugerido":N(iPS>=0?r[iPS]:0),
      "Quantidade Vendida":Math.round(N(iV>=0?r[iV]:0)),
      "Estoque Atual":Math.round(N(iE>=0?r[iE]:0)),
    }));
  }catch(e){S.eC=e.message||String(e);}
  S.lC=false;render();
}

async function loadApoio(){
  try{
    const rows=await readSheet(SHEET_ID,"Apoio!D:D");
    S.cores=rows.slice(1).map(r=>r[0]||"").filter(Boolean);
  }catch(e){S.cores=["Preto","Branco","Multicolor","Rosa","Azul","Verde","Vermelho","Amarelo","Cobre","Lilas","Bege","Cinza"];}
}

async function loadResumo(){
  try{
    // Fetch individual cells for reliability
    const [rP,rB5,rD5,rF5,rD10,rF10,rJ4,rA2,rB2,rC2,rJ2] = await Promise.all([
      readSheet(SHEET_ID,"Resumo!P1:P8"),
      readSheet(SHEET_ID,"Resumo!B5"),
      readSheet(SHEET_ID,"Resumo!D5"),
      readSheet(SHEET_ID,"Resumo!F5"),

      readSheet(SHEET_ID,"Resumo!J4"),

    ]);

    const parsePct=r=>{if(!r||!r[0]||!r[0][0])return 0;let v=N(r[0][0]);if(v>1)v=v/100;return v;};
    const totalInv=parseVal(rJ4)||11403.83;
    let margemReal=parsePct(rD5);
    let margemPot=parsePct(rD10);
    S.resumo={
      custoGrama:    N(rP[1]?.[0]||0.09),

      custoIma:      N(rP[6]?.[0]||0.18),
      totalInv,
      equipamentos: parseVal(rA2)||6500,
      insumos:      parseVal(rB2)||478.31,
      instrumentos: parseVal(rC2)||251.03,
      filamentos:   parseVal(rJ2)||3803.06,
      custoConf:  parseVal(rB5),
      margemReal,
      markupReal: parseVal(rF5),
      margemPot,
      markupPot:  parseVal(rF10),
    };
    console.log("Resumo loaded:",JSON.stringify(S.resumo));
  }catch(e){
    console.error("loadResumo error:",e);
    S.resumo={custoGrama:0.09,custoChaveiro:0.37,custoIma:0.18,
      totalInv:11403.83,
      custoConf:0,margemReal:0,markupReal:0,margemPot:0,markupPot:0};
  }
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function pgDash(){
  if(S.lP) return load("Carregando pedidos...");
  if(S.eP) return err(S.eP,"loadPed");
  const ped=S.pedidos;
  // CARD1: col M, F=Sim|Não, G=Sim|Não, H=Sim|Não (excluir Lead, Brinde, Consignado)
  const vTotalVendas=ped.filter(p=>["Sim","Não"].includes(p.Realizado)&&["Sim","Não"].includes(p.Entregue)&&["Sim","Não"].includes(p.Pago)).reduce((s,p)=>s+N(p.Valor),0);
  // CARD2: F=Sim, G=Sim|Não, H=Sim → soma col M
  const vRecebido=ped.filter(p=>p.Realizado==="Sim"&&["Sim","Não"].includes(p.Entregue)&&p.Pago==="Sim").reduce((s,p)=>s+N(p.Valor),0);
  // CARD3: realizados entregues não pagos
  const potPeds=ped.filter(p=>p.Realizado==="Sim"&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não");
  const vPot=potPeds.reduce((s,p)=>s+N(p.Valor),0);
  // CARD4: consignação vendida
  const vConsig=S.consig.reduce((s,c)=>s+N(c["Preço AD"])*N(c["Quantidade Vendida"]),0);
  // CARD5: CARD1 + CARD4
  const vSaldo=vTotalVendas+vConsig;
  const totInv=S.resumo.totalInv||TOT_INV;
  const saldo=vSaldo-totInv;
  const pay=Math.min((vSaldo/totInv)*100,100);
  const pos=saldo>=0;
  // Leads count
  const nLeads=ped.filter(p=>p.Realizado==="Lead").length;
  // Action counts
  const aP=ped.filter(p=>p.Realizado==="Não").length;
  const aE=ped.filter(p=>p.Realizado==="Sim"&&p.Entregue==="Não").length;
  const aC=ped.filter(p=>(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não").length;
  // Gráfico: col AB=Mes, AC=Ano, F=Sim, G=Sim|Não, H=Sim → soma col M
  const pm={},mesData={};
  ped.filter(p=>p.Realizado==="Sim"&&["Sim","Não"].includes(p.Entregue)&&p.Pago==="Sim").forEach(p=>{
    const mes=String(p.Mes||"").trim();
    const ano=String(p.Ano||"").trim();
    if(!mes)return;
    const key=mes+"/"+(ano||"2026");
    pm[key]=(pm[key]||0)+N(p.Valor);
    if(!mesData[key])mesData[key]={custo:0,lucro:0};
    const custo=N(p.CustoTotal||0);
    mesData[key].custo+=custo;
    mesData[key].lucro+=Math.max(N(p.Valor)-custo,0);
  });
  const me=Object.entries(pm);
  const mx=Math.max(...me.map(([,v])=>v),1);
  return`
    <h2>Dashboard</h2>
    <p class="sub">${ped.length} pedidos · ${S.att?"Atualizado "+S.att:""}</p>
    <div class="pbbox" style="background:${pos?"#f0fdf4":"#fef2f2"};border-color:${pos?"#bbf7d0":"#fecaca"}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800;font-size:14px;color:${pos?"#15803d":"#b91c1c"}">${pos?"✅ Operação POSITIVA":"⚠️ Operação ainda NEGATIVA"}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px">Investido: ${R(totInv)} · Saldo Final: ${R(vSaldo)} · Resultado: <strong style="color:${pos?"#15803d":"#b91c1c"}">${R(saldo)}</strong></div>
        </div>
        <div style="font-size:22px;font-weight:900;color:${pos?"#15803d":"#b91c1c"}">${pay.toFixed(0)}%</div>
      </div>
      <div class="pbbar"><div class="pbfill" style="width:${pay}%;background:${pos?"#16a34a":"#ef4444"}"></div></div>
      <div style="font-size:11px;color:#9ca3af">Payback: ${pay.toFixed(1)}% do investimento recuperado</div>
    </div>
    <div class="kgrid">
      ${kpi("Valor Total Vendas",R(vTotalVendas),"F=Sim/Não G=Sim/Não H=Sim/Não","#4f46e5")}
      ${kpi("Já Recebido (OK)",R(vRecebido),"F=Sim H=Sim · col M","#16a34a")}
      ${kpi("A Receber (Check)",R(vPot),potPeds.length+" pendentes","#d97706")}
      ${kpi("Consignação (AD)",R(vConsig),"Vendido nos parceiros","#7c3aed")}
      ${kpi("Saldo Final",R(vSaldo),"Vendas + Consignação","#0891b2")}
      ${kpi("Total Investido",R(totInv),"Resumo J4","#ef4444")}
      ${kpi("Custo Médio Grama",R(S.resumo.custoGrama),"Aba Resumo P2","#059669")}
      ${kpi("Custo Médio Chaveiro",R(S.resumo.custoChaveiro),"Aba Resumo P4","#db2777")}
      ${kpi("Custo Médio Imã",R(S.resumo.custoIma),"Aba Resumo P7","#9333ea")}
    </div>
    <div class="acgrid">
      <div class="accard" style="background:#fef2f2"><div class="acnum" style="color:#dc2626">${aP}</div><div class="aclbl" style="color:#dc2626">🖨️ Produzir</div></div>
      <div class="accard" style="background:#fffbeb"><div class="acnum" style="color:#d97706">${aE}</div><div class="aclbl" style="color:#d97706">📦 Entregar</div></div>
      <div class="accard" style="background:#f5f3ff"><div class="acnum" style="color:#7c3aed">${aC}</div><div class="aclbl" style="color:#7c3aed">💸 Cobrar</div></div>
      <div class="accard" style="background:#eff6ff"><div class="acnum" style="color:#2563eb">${nLeads}</div><div class="aclbl" style="color:#2563eb">🎯 Leads</div></div>
    </div>
    ${(()=>{
      if(!me.length) return "";
      let h='<div class="chart"><h3>Faturamento confirmado por mês</h3>';
      h+='<div style="display:flex;align-items:flex-end;gap:10px;height:140px;padding-bottom:4px">';
      me.forEach(([key,total])=>{
        const md=mesData[key]||{custo:0,lucro:0};
        const pctL=total>0?Math.round((md.lucro/total)*100):0;
        const barH=Math.max(Math.round((total/mx)*100),4);
        const hc=total>0?Math.round((md.custo/total)*barH):0;
        const hl=barH-hc;
        h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">';
        h+='<div style="font-size:10px;font-weight:800;color:#16a34a">'+pctL+'%</div>';
        h+='<div style="font-size:9px;color:#9ca3af">'+R(total).replace("R $ ","").replace("R$ ","")+'</div>';
        h+='<div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end">';
        if(hl>0) h+='<div style="width:100%;height:'+hl+'px;background:#16a34a;border-radius:'+(hc>0?'0':'4px')+'px 4px 0 0"></div>';
        if(hc>0) h+='<div style="width:100%;height:'+hc+'px;background:#f87171;border-radius:0 0 4px 4px"></div>';
        h+='</div><div style="font-size:10px;color:#6b7280;text-align:center">'+key.split("/")[0]+'</div></div>';
      });
      h+='</div>';
      h+='<div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:#6b7280;border-top:1px solid #f3f4f6;padding-top:8px">';
      h+='<span><span style="display:inline-block;width:10px;height:10px;background:#16a34a;border-radius:2px;margin-right:3px"></span>Lucro</span>';
      h+='<span><span style="display:inline-block;width:10px;height:10px;background:#f87171;border-radius:2px;margin-right:3px"></span>Custo</span>';
      h+='<span style="margin-left:auto">Total: <strong style="color:#4f46e5">'+R(me.reduce((s,[,v])=>s+v,0))+'</strong></span>';
      h+='</div></div>';
      return h;
    })()}
  `;
}

function getFilPed(filter){
  const b=S.busca.toLowerCase();
  return S.pedidos.filter(p=>{
    const bm=!b||(p.Pessoa||"").toLowerCase().includes(b)||(p["Impressão"]||"").toLowerCase().includes(b);
    if(filter==="produzir") return bm&&p.Realizado==="Não";
    if(filter==="entregar") return bm&&p.Realizado==="Sim"&&p.Entregue==="Não";
    if(filter==="cobrar")   return bm&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não";
    if(filter==="leads")    return bm&&p.Realizado==="Lead";
    return bm;
  });
}

      <td style="color:#6b7280">${dt}</td>

}

// ─── NOVO PEDIDO ──────────────────────────────────────────────────────────────
function openNew(){
  S.editModal={mode:"new",ped:{"Data Venda":today(),Pessoa:"","Impressão":"",Familia:"",Cor:"",Realizado:"Não",Entregue:"Não",Pago:"Não",Qtdd:1,"Preço unitário":0,Valor:0,"Valor Recebido":0}};
  showEditModal();
}
function calcPrecoSugerido(nomeImpressao){
  const sku=S.skus.find(s=>(s["Impressão"]||"")===nomeImpressao);
  if(!sku) return 0;
  const g=N(sku.FilamentoUnitario||0),h=N(sku.TempoemHora||0);
  const tp=sku.Tipo||"";
  const custoG=S.resumo.custoGrama||0.09;
  const tot=g*custoG*1.1+h*0.88+h*1.0+(tp==="Chaveiro"?N(S.resumo.custoChaveiro||0.37):0);
  return parseFloat((tot*2.5).toFixed(2));
}

function openEdit(i,filter){
  const fil=getFilPed(filter||"");
  const b=S.busca.toLowerCase();
  const filb=fil.filter(p=>!b||(p.Pessoa||"").toLowerCase().includes(b)||(p["Impressão"]||"").toLowerCase().includes(b));
  if(!filb[i])return;
  S.editModal={mode:"edit",ped:{...filb[i]}};
  showEditModal();
}

function onProdutoChange(val){
  S.editModal.ped["Impressão"]=val;
  const sku=S.skus.find(s=>(s["Impressão"]||"")===val);
  if(sku){
    S.editModal.ped.Familia=sku.Tipo||"";
    if(!N(S.editModal.ped["Preço unitário"])){
      const preco=calcPrecoSugerido(val);
      S.editModal.ped["Preço unitário"]=preco;
      S.editModal.ped.Valor=preco*(N(S.editModal.ped.Qtdd)||1);
    }
  }
  showEditModal();
}
// Called when user types in product datalist input
function onProdutoSearch(val){
  S.editModal.ped["Impressão"]=val;
  const sku=S.skus.find(s=>(s["Impressão"]||"")===val);
  if(sku){
    S.editModal.ped.Familia=sku.Tipo||"";
    if(!N(S.editModal.ped["Preço unitário"])){
      const preco=calcPrecoSugerido(val);
      S.editModal.ped["Preço unitário"]=preco;
      S.editModal.ped.Valor=preco*(N(S.editModal.ped.Qtdd)||1);
      showEditModal();
    }
  }
}

function showEditModal(){
  const {mode,ped}=S.editModal;
  const skuOpts=[...S.skus].sort((a,b)=>(a["Impressão"]||"").localeCompare(b["Impressão"]||"")).map(s=>`<option value="${s["Impressão"]||""}">${s["Impressão"]}</option>`).join("");
  const famOpts=["Utilidade","Enfeite","Caixa","Chaveiro","Vaso","Estátua","Fidget","Brinquedo","Letreiro","Outros"].map(f=>`<option${ped.Familia===f?" selected":""}>${f}</option>`).join("");
  const coresOpts=[...S.cores].sort((a,b)=>a.localeCompare(b)).map(c=>`<option>${c}</option>`).join("");
  const sel=(f,opts)=>opts.map(o=>`<option${ped[f]===o?" selected":""}>${o}</option>`).join("");

async function salvarPedido(){
  const {mode,ped}=S.editModal;
  if(!ped.Pessoa||!ped["Impressão"]){alert("Preencha cliente e produto.");return;}
  const qtd=N(ped.Qtdd)||1,pr=N(ped["Preço unitário"])||0;
  ped.Valor=qtd*pr;
  if(ped.Pago==="Sim"&&!N(ped["Valor Recebido"])) ped["Valor Recebido"]=ped.Valor;
  const check=(ped.Realizado==="Sim"&&ped.Entregue==="Sim"&&ped.Pago==="Sim")?"OK":"Check";
  try{
    const btn=document.querySelector(".btn-grn");
    if(btn){btn.textContent="Salvando...";btn.disabled=true;}
    if(mode==="new"){
      // Novo pedido: escreve A:L numa linha só, deixando vazio D(Família), I(Check), J(DataPag) — são fórmulas
      // M(Valor) e N(ValorRecebido) também são fórmulas, não precisam ser escritas
      const row=[
        ped["Data Venda"],  // A - Data Venda
        ped.Pessoa,          // B - Pessoa
        ped["Impressão"],    // C - Impressão
        "",                  // D - Família (FÓRMULA)
        ped.Cor,             // E - Cor
        ped.Realizado,       // F - Realizado
        ped.Entregue,        // G - Entregue
        ped.Pago,            // H - Pago
        "",                  // I - Check (FÓRMULA)
        "",                  // J - Data Pag
        qtd,                 // K - Qtdd
        pr,                  // L - Preço unitário
      ];
      // 1. Append the new row
      const appendRes = await fetch(
        "https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"/values/"+encodeURIComponent("Pedidos!A:L")+":append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS&includeValuesInResponse=true",
        {method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[row]})}
      );
      const appendData = await appendRes.json();
      // 2. Get the new row number from response
      const updRange = appendData?.updates?.updatedRange||"";
      const newRowMatch = updRange.match(/(\d+)$/);
      if(newRowMatch){
        const newRow = parseInt(newRowMatch[1]);
        const prevRow = newRow - 1;
        // 3. Copy formulas D(Família) and I(Check) from previous row
        async function copyFormCol(col){
          try{
            const fRes=await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"?ranges=Pedidos!"+col+prevRow+"&fields=sheets.data.rowData.values.userEnteredValue",
              {headers:{Authorization:"Bearer "+gToken}});
            const fData=await fRes.json();
            const formula=fData?.sheets?.[0]?.data?.[0]?.rowData?.[0]?.values?.[0]?.userEnteredValue?.formulaValue;
            if(formula){
              await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+SHEET_ID+"/values/"+encodeURIComponent("Pedidos!"+col+newRow)+"?valueInputOption=USER_ENTERED",
                {method:"PUT",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[[formula]]})});
            }
          }catch(e){console.warn("copyFormCol",col,e);}
        }
        await Promise.all([copyFormCol("D"), copyFormCol("I")]);
      }
    }else{
      // Edição: atualiza por blocos individuais, pulando D, I, M, N (fórmulas)
      const rowNum=ped._rowNum;
      if(!rowNum){alert("Erro: número da linha não encontrado.");return;}
      // A:C = Data, Pessoa, Impressão
      await updateRow(SHEET_ID,`Pedidos!A${rowNum}:C${rowNum}`,[ped["Data Venda"],ped.Pessoa,ped["Impressão"]]);
      // E:H = Cor, Realizado, Entregue, Pago (pula D=Família e I=Check)
      await updateRow(SHEET_ID,`Pedidos!E${rowNum}:H${rowNum}`,[ped.Cor,ped.Realizado,ped.Entregue,ped.Pago]);
      // K:L = Qtdd, Preço unitário (pula I=Check e J=DataPag)
      await updateRow(SHEET_ID,`Pedidos!K${rowNum}:L${rowNum}`,[qtd,pr]);
      // NÃO escreve: D(Família), I(Check), M(Valor), N(ValorRecebido) — são fórmulas
    }
    // Clear cache for pedidos
    Object.keys(_c).filter(k=>k.includes(SHEET_ID)&&k.includes("Pedidos")).forEach(k=>delete _c[k]);
    closeModal("edit-modal");
    await loadPed();
    alert(mode==="new"?"✅ Pedido inserido na planilha!":"✅ Pedido atualizado na planilha!");
  }catch(e){alert("Erro ao salvar: "+e.message);}
}

// ─── CONSIGNAÇÃO ──────────────────────────────────────────────────────────────
function pgConsig(){
  if(S.lC) return load("Carregando consignação...");
  if(S.eC) return err(S.eC,"loadCon");
  const sel=S.consigSel||"todos";
  const parc=[...new Set(S.consig.map(c=>c.Local||""))].filter(Boolean);
  const fil=sel==="todos"?S.consig:S.consig.filter(c=>(c.Local||"")===sel);
  const totAD=fil.reduce((s,c)=>s+N(c["Preço AD"])*N(c.Quantidade),0);
  const totV=fil.reduce((s,c)=>s+N(c["Preço AD"])*N(c["Quantidade Vendida"]),0);
  const totE=fil.reduce((s,c)=>s+N(c["Estoque Atual"]),0);
  const rows=fil.map((c,i)=>{
    const est=N(c["Estoque Atual"]),vend=N(c["Quantidade Vendida"]);
    return`<tr>
      <td style="font-weight:600">${c.Local||""}</td>
      <td>${c["Impressão"]||""}</td>
      <td style="color:#6b7280">${c.Cor||""}</td>
      <td style="text-align:center">${c.Quantidade||""}</td>
      <td style="font-weight:600">${R(c["Preço AD"]||0)}</td>
      <td style="color:#d97706;font-weight:600">${R(c["Preço Sugerido"]||0)}</td>
      <td style="text-align:center;font-weight:800;color:${vend>0?"#16a34a":"#9ca3af"}">${vend}</td>
      <td style="text-align:center;font-weight:800;color:${est<=1?"#d97706":"#374151"}">${est}</td>
      <td>${est===0?T("REPOR","red"):est<=2?T("Baixo","yellow"):T("OK","green")}</td>
    </tr>`;
  }).join("");
  return`
    <h2>🤝 Consignação</h2>
    <p class="sub">${parc.length} parceiros · Fechamento dia 30</p>
    <div class="fbar">${["todos",...parc].map(p=>`<button class="fbtn${sel===p?" on":""}" onclick="S.consigSel='${p}';render()">${p==="todos"?"Todos":p}</button>`).join("")}</div>
    <div class="ccards">
      ${[["Em consignação (AD)",R(totAD),"#4f46e5"],["Já vendido",R(totV),"#16a34a"],["Estoque total",totE+" un.","#d97706"]].map(([l,v,c])=>`<div class="ccard" style="border-top:3px solid ${c}"><div class="kl" style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase">${l}</div><div style="font-size:18px;font-weight:900;margin-top:2px;color:${c}">${v}</div></div>`).join("")}
    </div>
    <div class="twrap"><div class="tscroll">
      <table><thead><tr>${["Parceiro","Produto","Cor","Qtd","P.AD","P.Sug.","Vendido","Estoque","Status"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows||`<tr><td colspan="9" style="padding:28px;text-align:center;color:#9ca3af">Sem dados</td></tr>`}</tbody></table>
    </div></div>`;
}

// ─── APP PARCEIRO (somente visualização) ──────────────────────────────────────
function pgParceiro(){
  const parc=S.parcSel;
  const est=S.consig.filter(c=>(c.Local||"")===parc);
  const totAD=est.reduce((s,c)=>s+N(c["Preço AD"])*N(c.Quantidade),0);
  const totVend=est.reduce((s,c)=>s+N(c["Preço AD"])*N(c["Quantidade Vendida"]),0);
  const totEst=est.reduce((s,c)=>s+N(c["Estoque Atual"]),0);
  const qtdVend=est.reduce((s,c)=>s+N(c["Quantidade Vendida"]),0);
  // Histórico mensal
  const pm={};
  S.pedidos.filter(p=>p.Pago==="Sim").forEach(p=>{
    const mes=String(p.Mes||"").trim(),ano=String(p.Ano||"").trim();
    const nome=p.Pessoa||"";
    if(!mes||!nome.toLowerCase().includes(parc.toLowerCase().split(" ")[0].toLowerCase()))return;
    const k=`${mes}/${ano||"2026"}`;
    if(!pm[k])pm[k]={tot:0,qtd:0};
    pm[k].tot+=N(p.Valor);pm[k].qtd+=N(p.Qtdd)||1;
  });
  const me=Object.entries(pm);
  const mx=Math.max(...me.map(([,v])=>v.tot),1);
  const stItems=est.length?est.map(c=>{
    const e=N(c["Estoque Atual"]),vd=N(c["Quantidade Vendida"]);
    return`<div class="si" style="background:${e<=2?"#fffbeb":"#f9fafb"};${e<=2?"border:1px solid #fcd34d":""}">
      <div class="si-name"><div style="font-size:13px;font-weight:700">${c["Impressão"]||""}</div><div style="font-size:11px;color:#6b7280">${c.Cor||""}</div></div>
      <div class="si-pill" style="background:${e<=2?"#fef3c7":"#f0fdf4"}"><div class="pv" style="color:${e<=2?"#d97706":"#16a34a"}">${e}</div><div class="pl">estoque</div></div>
      <div class="si-pill" style="background:#eef2ff"><div class="pv" style="color:#4f46e5;font-size:14px">${vd}</div><div class="pl">vendido</div></div>
      <div class="si-pill" style="background:#f0fdf4"><div class="pv" style="color:#15803d;font-size:13px">${R(N(c["Preço AD"]))}</div><div class="pl">preço AD</div></div>
      <div class="si-pill" style="background:#ede9fe"><div class="pv" style="color:#5b21b6;font-size:13px">${R(N(c["Preço Sugerido"]))}</div><div class="pl">p. sugerido</div></div>
    </div>`;
  }).join(""):`<div style="padding:20px;text-align:center;color:#9ca3af;font-size:13px">Sem dados de consignação para este parceiro</div>`;
  return`
    <div class="ph"><div class="pre">Portal do Parceiro</div><h2>${parc}</h2><p>Visualização de estoque · Fechamento dia 30 · PIX: 376.844.548-89</p></div>
    <div class="fbar">${Object.keys(S.parceiros).map(p=>`<button class="fbtn${parc===p?" on":""}" onclick="S.parcSel='${p}';render()">${p}</button>`).join("")}</div>
    <div class="ccards">
      ${[["Em consignação",R(totAD),"#4f46e5"],["Já vendido",R(totVend),"#16a34a"],["Estoque",totEst+" un.","#d97706"],["Qtd vendida",qtdVend+" peças","#7c3aed"]].map(([l,v,c])=>`<div class="ccard" style="border-top:3px solid ${c}"><div class="kl" style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase">${l}</div><div style="font-size:18px;font-weight:900;margin-top:2px;color:${c}">${v}</div></div>`).join("")}
    </div>
    ${me.length?`<div class="chart" style="margin-bottom:16px"><h3>📈 Histórico de Vendas — ${parc}</h3><div class="bars">${me.map(([m,v])=>`<div class="bc"><div class="bv">${v.qtd}un</div><div class="bar" style="height:${(v.tot/mx)*75}px"></div><div class="bl">${m}</div></div>`).join("")}</div><div style="font-size:12px;color:#6b7280;border-top:1px solid #f3f4f6;padding-top:8px;margin-top:8px">Total: <strong style="color:#4f46e5">${R(me.reduce((s,[,v])=>s+v.tot,0))}</strong> · Peças: <strong style="color:#7c3aed">${me.reduce((s,[,v])=>s+v.qtd,0)}</strong></div></div>`:`<div class="card" style="margin-bottom:16px;text-align:center;color:#9ca3af;font-size:13px;padding:20px">Sem histórico para este parceiro</div>`}
    <div class="card">
      <h3 style="margin-bottom:6px">📦 Estoque + Preços</h3>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:12px">Estoque atual · Vendido · Preço AD · Preço sugerido</div>
      ${S.lC?load("Carregando..."):stItems}
      <div class="pixbox"><strong style="color:#15803d">💰 Fechamento Mensal</strong><br>Todo dia 30 · PIX: <strong>376.844.548-89</strong><br>Eduardo Perez Marcelo · Bradesco</div>
    </div>`;
}

          <div style="flex:1"><div style="font-weight:700;font-size:13px">${nome}</div><div style="font-size:11px;color:#9ca3af;font-family:monospace">${id.slice(0,28)}...</div></div>
          <button onclick="removerParceiro('${nome}')" style="padding:4px 10px;border-radius:7px;border:none;background:#fee2e2;color:#991b1b;font-weight:700;cursor:pointer;font-size:11px;font-family:inherit">Remover</button>

        1. Duplique uma planilha de parceiro no Google Drive<br>
        2. Compartilhe como "Qualquer pessoa com o link pode editar"<br>
        3. Cole o ID ou URL da nova planilha abaixo
      </div>
      <div class="fgrid">
        <div><label class="flbl">Nome do Parceiro *</label><input id="np-n" class="finp" placeholder="Ex: Loja da Maria"/></div>
        <div><label class="flbl">ID ou URL da Planilha *</label><input id="np-i" class="finp" placeholder="1BxrGwTV535... ou URL completa"/></div>
      </div>
      <button onclick="adicionarParceiro()" class="btn-pri" style="margin-top:14px">Salvar Parceiro</button>
    </div>`;
}
function adicionarParceiro(){
  const nome=document.getElementById("np-n")?.value?.trim();
  const id=document.getElementById("np-i")?.value?.trim();
  if(!nome||!id){alert("Preencha nome e ID.");return;}
  const m=id.match(/\/d\/([a-zA-Z0-9_-]+)/);
  S.parceiros[nome]=m?m[1]:id;
  try{localStorage.setItem("amalello_parc",JSON.stringify(S.parceiros));}catch(e){}
  alert(`Parceiro "${nome}" adicionado!`);render();
}
function removerParceiro(nome){
  if(!confirm(`Remover "${nome}"?`))return;
  delete S.parceiros[nome];
  try{localStorage.setItem("amalello_parc",JSON.stringify(S.parceiros));}catch(e){}
  render();
}
