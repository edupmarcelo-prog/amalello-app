<title>Amalello Design</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:#f1f5f9;display:flex;height:100vh;overflow:hidden;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* SIDEBAR */
.sb{width:220px;background:#18181b;display:flex;flex-direction:column;height:100vh;flex-shrink:0;}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo h1{color:#fff;font-size:17px;font-weight:900;letter-spacing:-.03em;}
.sb-logo p{color:#52525b;font-size:11px;margin-top:2px;}
.sb-sync{color:#22c55e;font-size:10px;margin-top:5px;}
.sb-nav{flex:1;padding:9px 7px;overflow-y:auto;display:flex;flex-direction:column;gap:1px;}
.nb{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:13px;background:transparent;color:#71717a;text-align:left;width:100%;transition:all .15s;}
.nb:hover{background:rgba(255,255,255,.05);color:#a1a1aa;}
.nb.on{background:rgba(99,102,241,.2);color:#a5b4fc;font-weight:700;}
.ni{font-size:14px;margin-right:8px;}
.bdg{background:#ef4444;color:#fff;font-size:10px;font-weight:800;border-radius:20px;padding:1px 6px;}
.sb-ft{padding:0 9px 0;}
.sync-btn{width:100%;padding:7px;border-radius:8px;border:none;background:rgba(99,102,241,.15);color:#a5b4fc;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;margin-bottom:7px;}
.user-box{background:rgba(255,255,255,.04);border-radius:9px;padding:9px 11px;margin-bottom:8px;}

/* CONTENT */
.ct{flex:1;overflow-y:auto;padding:24px 22px;}
.ci{max-width:1140px;margin:0 auto;animation:fade .2s ease;}
h2{font-size:20px;font-weight:900;color:#111827;margin:0 0 4px;}
.sub{color:#6b7280;font-size:13px;margin-bottom:18px;}

/* CARDS */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.kcard{background:#fff;border-radius:12px;padding:14px 16px;border-left:4px solid #ccc;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.kcard .kl{font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.kcard .kv{font-size:19px;font-weight:900;color:#111827;margin-top:2px;}
.kcard .ks{font-size:11px;color:#9ca3af;margin-top:1px;}

/* TAGS */
.tag{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;display:inline-block;white-space:nowrap;}
.tg{background:#d1fae5;color:#065f46;}
.ty{background:#fef3c7;color:#92400e;}
.tr{background:#fee2e2;color:#991b1b;}
.tb{background:#dbeafe;color:#1e40af;}
.tp{background:#ede9fe;color:#5b21b6;}
.to{background:#ffedd5;color:#9a3412;}
.tgr{background:#f3f4f6;color:#374151;}

/* TABLE */
.twrap{background:#fff;border-radius:13px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:10px;}
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#f9fafb;border-bottom:1px solid #e5e7eb;}
th{padding:9px 10px;text-align:left;font-weight:700;color:#374151;font-size:11px;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f3f4f6;}
tbody tr:nth-child(even){background:#fafafa;}
td{padding:7px 10px;color:#374151;vertical-align:middle;}

/* BUTTONS */
.btn-pri{padding:8px 18px;border-radius:9px;border:none;background:#4f46e5;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;}
.btn-sec{padding:8px 16px;border-radius:9px;border:none;background:#f3f4f6;color:#374151;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;}
.btn-grn{padding:8px 18px;border-radius:9px;border:none;background:#16a34a;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;}
.btn-sm{padding:3px 8px;border-radius:6px;border:none;background:#eef2ff;color:#4f46e5;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;margin-right:3px;}
.btn-view{padding:3px 8px;border-radius:6px;border:none;background:#f3f4f6;color:#374151;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;}

/* SEARCH */
.sbar{display:flex;gap:10px;margin-bottom:12px;align-items:center;}
.sinp{flex:1;padding:8px 13px;border-radius:9px;border:1px solid #d1d5db;font-size:13px;font-family:inherit;outline:none;}
.fbar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.fbtn{padding:6px 13px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;background:#f3f4f6;color:#374151;}
.fbtn.on{background:#4f46e5;color:#fff;}

/* PAYBACK */
.pbbox{border-radius:14px;padding:16px 20px;margin-bottom:16px;border:1px solid;}
.pbbar{background:rgba(0,0,0,.08);border-radius:20px;height:9px;overflow:hidden;margin:8px 0 4px;}
.pbfill{height:100%;border-radius:20px;transition:width .6s;}

/* ACTION CARDS */
.acgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.accard{border-radius:14px;padding:16px 18px;text-align:center;}
.acnum{font-size:32px;font-weight:900;}
.aclbl{font-size:12px;font-weight:700;opacity:.8;margin-top:2px;}

/* CHART */
.chart{background:#fff;border-radius:13px;padding:18px;border:1px solid #e5e7eb;}
.chart h3{font-size:13px;font-weight:700;color:#111827;margin-bottom:12px;}
.bars{display:flex;align-items:flex-end;gap:8px;height:90px;}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bc .bar{width:100%;background:#4f46e5;border-radius:4px 4px 0 0;min-height:4px;}
.bc .bl{font-size:10px;color:#6b7280;}
.bc .bv{font-size:9px;color:#9ca3af;}

/* TWO COL */
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:#fff;border-radius:13px;padding:18px;border:1px solid #e5e7eb;}
.card h3{font-size:13px;font-weight:700;color:#111827;margin-bottom:12px;}

/* MODAL */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:18px;padding:26px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.mhdr h3{font-size:16px;font-weight:800;margin:0;}
.mcls{border:none;background:#f3f4f6;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fgrid .full{grid-column:span 2;}
.flbl{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;}
.finp{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;font-family:inherit;box-sizing:border-box;outline:none;}
.fsel{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;font-family:inherit;background:#fff;}

/* PARCEIRO */
.ph{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:14px;padding:18px 22px;color:#fff;margin-bottom:16px;}
.ph .pre{font-size:10px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.06em;}
.ph h2{font-size:18px;font-weight:900;margin:3px 0 0;color:#fff;}
.ph p{opacity:.8;font-size:12px;margin:4px 0 0;}

/* STOCK ITEM */
.si{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:8px;flex-wrap:wrap;}
.si-name{flex:1;min-width:130px;}
.si-name .n{font-size:13px;font-weight:700;}
.si-name .s{font-size:11px;color:#6b7280;}

.si-pill .pv{font-weight:900;font-size:18px;}
.si-pill .pl{font-size:10px;color:#6b7280;}

/* LOADING / ERROR */

.spinner{width:30px;height:30px;border:3px solid #e5e7eb;border-top:3px solid #4f46e5;border-radius:50%;animation:spin .8s linear infinite;}
.errbox{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;margin:12px 0;}
.errbox h4{color:#991b1b;margin-bottom:4px;}
.errbox p{font-size:13px;color:#7f1d1d;margin-bottom:8px;}
.errbox small{font-size:12px;color:#9ca3af;display:block;margin-bottom:10px;}

/* LOGIN */
.login-wrap{min-height:100vh;background:#18181b;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',-apple-system,sans-serif;width:100%;}
.login-box{background:#27272a;border-radius:24px;padding:48px 52px;text-align:center;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-icon{width:64px;height:64px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:18px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:28px;}

/* INVEST ROW */
.irow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px;}
.idot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:7px;}
.cbar{background:#f3f4f6;border-radius:20px;height:5px;margin-top:3px;}
.cfill{height:100%;border-radius:20px;}

/* TOTALS */
.tots{font-size:13px;color:#6b7280;display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;}

/* VENDA REG */
.vreg{display:flex;justify-content:space-between;font-size:12px;padding:5px 9px;background:#f9fafb;border-radius:7px;margin-bottom:4px;}

/* PIX BOX */
.pixbox{margin-top:13px;background:#f0fdf4;border-radius:11px;padding:12px 14px;font-size:12px;color:#374151;line-height:1.7;}

/* SKU GRID */
.skugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px;}
.skucard{background:#fff;border-radius:13px;border:1px solid #e5e7eb;overflow:hidden;}
.skuhdr{padding:9px 13px;display:flex;justify-content:space-between;}
.skuimg{height:110px;overflow:hidden;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:26px;}
.skuimg img{width:100%;height:100%;object-fit:cover;}
.skubody{padding:13px;}
.skuname{font-weight:800;font-size:14px;color:#111827;margin-bottom:9px;}
.skumeta{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:12px;}
.skumi{border-radius:7px;padding:5px 7px;}
.skumi .ml{color:#9ca3af;font-size:10px;}
.skumi .mv{font-weight:700;}

/* DETAIL GRID */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.dbox{border-radius:10px;padding:13px;}
.dsl{font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:8px;}
.drow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid;}
.drow span:first-child{color:#6b7280;}
.drow span:last-child{font-weight:600;}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.mitem{background:#f9fafb;border-radius:10px;padding:10px 12px;text-align:center;}
.mitem .ml{font-size:10px;color:#9ca3af;font-weight:700;}
.mitem .mv{font-size:17px;font-weight:900;margin-top:3px;}
.alertbox{padding:10px 14px;border-radius:10px;font-size:13px;}

/* CONSIG CARDS */
.ccards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.ccard{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e7eb;text-align:center;}
.ccard .cv{font-size:19px;font-weight:900;margin-top:2px;}
.ccard .cl{font-size:11px;color:#6b7280;margin-top:2px;}

/* PARCEIRO VIEW */
.parc-layout{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
</style>

const COR_TIPO = {Chaveiro:"#7c3aed",Caixa:"#d97706",Vaso:"#059669",Utilidade:"#2563eb",Fidget:"#db2777","Estátua":"#9333ea",Brinquedo:"#dc2626",Letreiro:"#0891b2",Outros:"#6b7280",Enfeite:"#16a34a"};

// ─── AUTH ────────────────────────────────────────────────────────────────────
let gToken = null, gapiOk = false, gsiOk = false, tokenClient = null;
let userEmail = "", userName = "";

function loadScript(src){ return new Promise(r=>{if(document.querySelector(`script[src="${src}"]`)){r();return;}const s=document.createElement("script");s.src=src;s.onload=r;document.head.appendChild(s);}); }

async function initAuth(){
  await Promise.all([loadScript("https://apis.google.com/js/api.js"),loadScript("https://accounts.google.com/gsi/client")]);
  await new Promise(r=>gapi.load("client",r));
  await gapi.client.init({apiKey:API_KEY,discoveryDocs:["https://sheets.googleapis.com/$discovery/rest?version=v4"]});
  gapiOk=true; gsiOk=true;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:SCOPES,
    callback: resp=>{
      if(resp.error){console.error("Auth error:",resp);alert("Erro de autenticação: "+resp.error);showLogin();return;}
      gToken=resp.access_token;
      gapi.client.setToken({access_token:gToken});
      // get user info
      fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+gToken}})
        .then(r=>r.json()).then(u=>{userEmail=u.email||"";userName=u.name||"";showApp();})
        .catch(()=>showApp());
    }
  });
}

function doLogin(){
  if(!gapiOk){
    setTimeout(doLogin, 500);
    return;
  }
  tokenClient.requestAccessToken({prompt:""});
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function N(v){
  if(v===null||v===undefined||v==="") return 0;
  if(typeof v==="number") return v;
  const s=String(v).trim().replace(/[R$\s]/g,"");
  if(!s) return 0;
  if(s.includes(",")&&s.includes(".")) return parseFloat(s.replace(/\./g,"").replace(",","."));
  if(s.includes(",")) return parseFloat(s.replace(",","."));
  return parseFloat(s)||0;
}
const R = v=>`R$\u00a0${N(v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}`;
const P = v=>`${(N(v)*100).toFixed(1)}%`;
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){
  if(!s||s==="") return "";
  const st=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(st)) return st.slice(0,10);
  if(/^\d{2}\/\d{2}\/\d{4}/.test(st)){const[d,m,y]=st.split("/");return`${y}-${m}-${d}`;}
  const mn=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const mm=st.toLowerCase().match(/(\d{1,2})[\s\-\/]([a-záàãâéêíóôõúü]{3})/);
  if(mm){const mi=mn.indexOf(mm[2].normalize("NFD").replace(/[\u0300-\u036f]/g,""));if(mi>=0)return`2026-${String(mi+1).padStart(2,"0")}-${mm[1].padStart(2,"0")}`;}
  const n=+s; if(!isNaN(n)&&n>1000) return new Date((n-25569)*86400*1000).toISOString().slice(0,10);
  return "";
}
function rows2obj(rows,forceIdx){
  if(!rows||rows.length<2) return [];
  const h=rows[0];
  return rows.slice(1).filter(r=>r&&r.some(c=>c!=="")).map(r=>{
    const o={};
    h.forEach((k,j)=>{if(k&&k.trim())o[k.trim()]=r[j]??""});
    if(forceIdx){forceIdx.forEach(([key,idx])=>{if(!N(o[key])&&r[idx]!==undefined&&r[idx]!=="")o[key]=r[idx];});}
    return o;
  });
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function readSheet(id,range){
  try{
    // Try gapi first
    const res=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:id,range});
    return res.result.values||[];
  }catch(e){
    // Fallback to fetch with token
    if(!gToken) throw e;
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`;
    const res=await fetch(url,{headers:{Authorization:"Bearer "+gToken}});
    if(!res.ok){const err=await res.json();throw new Error(err?.error?.message||"Erro leitura planilha");}
    return (await res.json()).values||[];
  }
}
async function appendSheet(id,range,values){
  try{
    await gapi.client.sheets.spreadsheets.values.append({spreadsheetId:id,range,valueInputOption:"USER_ENTERED",insertDataOption:"INSERT_ROWS",resource:{values:[values]}});
  }catch(e){
    if(!gToken) throw e;
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
    const res=await fetch(url,{method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:JSON.stringify({values:[values]})});
    if(!res.ok){const err=await res.json();throw new Error(err?.error?.message||"Erro gravação planilha");}
  }
}

// ─── CUSTEIO ─────────────────────────────────────────────────────────────────
function calcCusto(g,h,isChav=false){
  const CFG=N(g)*0.08844,TD=CFG*.1,CEE=N(h)*.88,DEP=N(h)*1,ad=isChav?.3681:0;
  return{CFG,TD,CEE,DEP,ad,tot:CFG+TD+CEE+DEP+ad};
}

// ─── RENDER MAIN ─────────────────────────────────────────────────────────────
function render(){

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function pgDash(){
  if(S.lP) return load("Carregando pedidos...");
  if(S.eP) return err(S.eP,"loadPed");
  const ped=S.pedidos;
  // Excluir Brinde e Consignado dos totais
  const semBC=p=>p.Pago!=="Brinde"&&p.Entregue!=="Consignado";
  const ok=ped.filter(p=>p.Realizado==="Sim"&&p.Entregue==="Sim"&&p.Pago==="Sim");
  const vRecebido=ok.reduce((s,p)=>s+N(p["Valor Recebido"]),0);
  // Valor total vendas = col M sem Brinde/Consig
  const vTotal=ped.filter(semBC).reduce((s,p)=>s+N(p.Valor),0);
  // Consignação vendida
  const vConsig=S.consig.reduce((s,c)=>s+N(c["Preço AD"])*N(c["Quantidade Vendida"]),0);
  const vSaldo=vTotal+vConsig;
  const pot=ped.filter(p=>p.Realizado==="Sim"&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não"&&p.Pago!=="Brinde");
  const vPot=pot.reduce((s,p)=>s+N(p.Valor),0);
  const aP=ped.filter(p=>p.Realizado!=="Sim"&&p.Realizado!=="Lead"!==false).length;
  const aE=ped.filter(p=>p.Realizado==="Sim"&&p.Entregue==="Não").length;
  const aC=ped.filter(p=>(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não").length;
  const saldo=vSaldo-TOT_INV;
  const pay=Math.min((vSaldo/TOT_INV)*100,100);
  const pos=saldo>=0;
  // Gráfico por mês
  const pm={};
  ped.forEach(p=>{const d=fmtDate(p["Data Venda"]);if(!d||d.length<7)return;const m=new Date(d).getMonth();if(!pm[m])pm[m]=0;if(p.Pago==="Sim")pm[m]+=N(p["Valor Recebido"]);});
  const me=Object.entries(pm);
  const mx=Math.max(...me.map(([,v])=>v),1);
  return`
    <h2>Dashboard</h2>
    <p class="sub">${ped.length} pedidos · ${S.att?"Atualizado "+S.att:""}</p>
    <div class="pbbox" style="background:${pos?"#f0fdf4":"#fef2f2"};border-color:${pos?"#bbf7d0":"#fecaca"}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800;font-size:14px;color:${pos?"#15803d":"#b91c1c"}">${pos?"✅ Operação POSITIVA":"⚠️ Operação ainda NEGATIVA"}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px">Investido: ${R(TOT_INV)} · Saldo Final: ${R(vSaldo)} · Resultado: <strong style="color:${pos?"#15803d":"#b91c1c"}">${R(saldo)}</strong></div>
        </div>
        <div style="font-size:22px;font-weight:900;color:${pos?"#15803d":"#b91c1c"}">${pay.toFixed(0)}%</div>
      </div>
      <div class="pbbar"><div class="pbfill" style="width:${pay}%;background:${pos?"#16a34a":"#ef4444"}"></div></div>
      <div style="font-size:11px;color:#9ca3af">Payback: ${pay.toFixed(1)}% do investimento recuperado</div>
    </div>
    <div class="kgrid">
      ${kpi("Valor Total Vendas",R(vTotal),"Col.M sem Brinde/Consig","#4f46e5")}
      ${kpi("Já Recebido (OK)",R(vRecebido),ok.length+" pedidos pagos","#16a34a")}
      ${kpi("A Receber (Check)",R(vPot),pot.length+" pendentes","#d97706")}
      ${kpi("Consignação (AD)",R(vConsig),"Vendido nos parceiros","#7c3aed")}
      ${kpi("Saldo Final",R(vSaldo),"Vendas + Consignação","#0891b2")}
      ${kpi("Total Investido",R(TOT_INV),"Equip+Filam+Insumos","#ef4444")}
    </div>
    <div class="acgrid">
      <div class="accard" style="background:#fef2f2"><div class="acnum" style="color:#dc2626">${aP}</div><div class="aclbl" style="color:#dc2626">🖨️ Produzir</div></div>

    </div>

  `;
}

// ─── PEDIDOS ─────────────────────────────────────────────────────────────────
function getFilPed(filter){
  const b=S.busca.toLowerCase();
  return S.pedidos.filter(p=>{
    const bm=!b||(p.Pessoa||"").toLowerCase().includes(b)||(p.Impressão||"").toLowerCase().includes(b);
    if(filter==="produzir") return bm&&p.Realizado!=="Sim";
    if(filter==="entregar") return bm&&p.Realizado==="Sim"&&p.Entregue==="Não";
    if(filter==="cobrar")   return bm&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não";
    return bm;
  });
}
function pgPedidos(filter){
  if(S.lP) return load("Carregando pedidos...");
  if(S.eP) return err(S.eP,"loadPed");
  const titulo={produzir:"🖨️ A Produzir",entregar:"📦 A Entregar",cobrar:"💸 A Cobrar"}[filter]||"📋 Todos os Pedidos";
  const fil=getFilPed(filter);
  const totV=fil.reduce((s,p)=>s+N(p.Valor),0);
  const totR=fil.reduce((s,p)=>s+N(p["Valor Recebido"]),0);
  function bt(p){
    if(p.Realizado==="Lead") return T("Lead","blue");

    if(p.Pago==="Não")       return T("Cobrar","purple");
    if(p.Pago==="Brinde")    return T("Brinde","orange");
    return T("OK ✓","green");
  }
  const rows=fil.map((p,i)=>{
    const dt=fmtDate(p["Data Venda"]||"").slice(5)||"—";
    const rC=p.Realizado==="Sim"?"green":p.Realizado==="Lead"?"blue":"red";
    const eC=p.Entregue==="Sim"?"green":p.Entregue==="Consignado"?"blue":"yellow";
    const pgC=p.Pago==="Sim"?"green":p.Pago==="Brinde"?"orange":"yellow";
    return`<tr>
      <td style="color:#6b7280">${dt}</td>
      <td style="font-weight:600;color:#111827;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.Pessoa||""}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.Impressão||""}</td>
      <td style="color:#6b7280">${p.Familia||""}</td>
      <td style="color:#6b7280">${p.Cor||""}</td>
      <td style="text-align:center;font-weight:700">${p.Qtdd||1}</td>
      <td style="font-weight:800;color:#4f46e5">${R(p.Valor)}</td>
      <td style="font-weight:700;color:${N(p["Valor Recebido"])>0?"#16a34a":"#9ca3af"}">${R(p["Valor Recebido"])}</td>
      <td>${T(p.Realizado||"?",rC)}</td>
      <td>${T(p.Entregue||"?",eC)}</td>
      <td>${T(p.Pago||"?",pgC)}</td>
      <td>${bt(p)}</td>
      <td style="white-space:nowrap">
        <button class="btn-sm" onclick="openEdit(${i},'${filter||""}')">✏️</button>
        <button class="btn-view" onclick="openDet(${i},'${filter||""}')">Ver</button>
      </td>
    </tr>`;
  }).join("");
  return`
    <h2>${titulo}</h2>
    <p class="sub">${fil.length} pedido(s) · ${R(totV)}</p>
    <div class="sbar">
      <input class="sinp" placeholder="Buscar cliente ou produto..." value="${S.busca}" oninput="S.busca=this.value;render()"/>
      <button class="btn-pri" onclick="openNew()">+ Novo Pedido</button>
    </div>
    <div class="twrap"><div class="tscroll">
      <table><thead><tr>${["Data","Cliente","Produto","Fam.","Cor","Qtd","Valor","Recebido","Realiz.","Entreg.","Pago","Status",""].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows||`<tr><td colspan="13" style="padding:32px;text-align:center;color:#9ca3af">Nenhum pedido encontrado</td></tr>`}</tbody></table>
    </div></div>
    <div class="tots">
      <span>Total: <strong style="color:#4f46e5">${R(totV)}</strong></span>
      <span>Recebido: <strong style="color:#16a34a">${R(totR)}</strong></span>
      <span>Pendente: <strong style="color:#d97706">${R(totV-totR)}</strong></span>
    </div>
  `;
}

      ${tot>0?`<div style="margin-top:14px;background:#f0fdf4;border-radius:10px;padding:11px 16px;font-size:13px;display:flex;gap:18px;flex-wrap:wrap">

async function salvarPedido(){
  const {mode,ped,origIdx}=S.editModal;
  if(!ped.Pessoa||!ped["Impressão"]){alert("Preencha cliente e produto.");return;}
  const qtd=N(ped.Qtdd)||1,pr=N(ped["Preço unitário"])||0;
  ped.Valor=qtd*pr;
  if(ped.Pago==="Sim"&&!N(ped["Valor Recebido"])) ped["Valor Recebido"]=ped.Valor;
  const check=(ped.Realizado==="Sim"&&ped.Entregue==="Sim"&&ped.Pago==="Sim")?"OK":"Check";
  const row=[ped["Data Venda"],ped.Pessoa,ped["Impressão"],ped.Familia,ped.Cor,ped.Realizado,ped.Entregue,ped.Pago,check,"",qtd,pr,ped.Valor,ped["Valor Recebido"]];
  try{
    const btn=document.querySelector(".btn-grn");
    if(btn){btn.textContent="Salvando...";btn.disabled=true;}
    await appendSheet(SHEET_ID,"Pedidos!A:N",row);
    if(mode==="new") S.pedidos.push(ped);
    else S.pedidos[origIdx]=ped;
    closeModal("edit");
    await loadPed();
    alert("✅ Pedido salvo na planilha!");
  }catch(e){alert("Erro ao salvar: "+e.message);}
}

// ─── FINANCEIRO ───────────────────────────────────────────────────────────────
function pgFin(){
  if(S.lP) return load("Carregando...");
  if(S.eP) return err(S.eP,"loadPed");
  const ok=S.pedidos.filter(p=>p.Realizado==="Sim"&&p.Entregue==="Sim"&&p.Pago==="Sim");
  const vOK=ok.reduce((s,p)=>s+N(p["Valor Recebido"]),0);
  const saldo=vOK-TOT_INV;
  const pf={};
  ok.forEach(p=>{pf[p.Familia]=(pf[p.Familia]||0)+N(p["Valor Recebido"]);});
  return`
    <h2>📊 Financeiro</h2>
    <p class="sub">Investimentos, receita e resultado</p>
    <div class="kgrid">
      ${kpi("Total Investido",R(TOT_INV),null,"#ef4444")}
      ${kpi("Receita Confirmada",R(vOK),"Pedidos OK pagos","#4f46e5")}
      ${kpi("Saldo",R(saldo),saldo<0?"A recuperar":"Lucro","#16a34a")}
      ${kpi("Payback",`${Math.min((vOK/TOT_INV)*100,100).toFixed(0)}%`,null,"#d97706")}
    </div>
    <div class="twocol">
      <div class="card">
        <h3>Detalhamento do Investimento</h3>
        ${Object.entries(INVEST).map(([k,v])=>{
          const c={Equipamentos:"#ef4444",Instrumentos:"#f59e0b",Insumos:"#10b981",Filamentos:"#4f46e5"}[k];
          return`<div class="irow"><div><span class="idot" style="background:${c}"></span>${k}</div><strong>${R(v)}</strong></div>`;
        }).join("")}
        <div class="irow" style="border:none;font-weight:900;font-size:13px"><span>Total</span><span style="color:#ef4444">${R(TOT_INV)}</span></div>
      </div>
      <div class="card">
        <h3>Receita por Categoria (OK)</h3>
        ${Object.entries(pf).sort((a,b)=>b[1]-a[1]).map(([f,v])=>`<div style="margin-bottom:9px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${f}</span><span style="font-weight:700;color:${COR_TIPO[f]||"#4f46e5"}">${R(v)}</span></div>
          <div class="cbar"><div class="cfill" style="width:${(v/vOK)*100}%;background:${COR_TIPO[f]||"#4f46e5"}"></div></div>
        </div>`).join("")}
      </div>
    </div>
  `;
}

// ─── CONSIGNAÇÃO ──────────────────────────────────────────────────────────────
function pgConsig(){
  if(S.lC) return load("Carregando consignação...");
  if(S.eC) return err(S.eC,"loadCon");
  const sel=S.consigSel||"todos";
  const parc=[...new Set(S.consig.map(c=>c.Local||""))].filter(Boolean);
  const fil=sel==="todos"?S.consig:S.consig.filter(c=>(c.Local||"")===sel);
  const totAD=fil.reduce((s,c)=>s+N(c["Preço AD"])*N(c.Quantidade),0);
  const totV=fil.reduce((s,c)=>s+N(c["Preço AD"])*N(c["Quantidade Vendida"]),0);
  const totE=fil.reduce((s,c)=>s+N(c["Estoque Atual"]),0);
  const rows=fil.map((c,i)=>{
    const est=N(c["Estoque Atual"]),vend=N(c["Quantidade Vendida"]);
    const st=est===0?T("REPOR","red"):est<=2?T("Baixo","yellow"):T("OK","green");
    return`<tr>
      <td style="font-weight:600">${c.Local||""}</td>
      <td>${c.Impressão||""}</td>
      <td style="color:#6b7280">${c.Cor||""}</td>
      <td style="text-align:center">${c.Quantidade||""}</td>
      <td style="font-weight:600">${R(c["Preço AD"]||0)}</td>
      <td style="color:#d97706;font-weight:600">${R(c["Preço Sugerido"]||0)}</td>
      <td style="text-align:center;font-weight:800;color:${vend>0?"#16a34a":"#9ca3af"}">${vend}</td>
      <td style="text-align:center;font-weight:800;color:${est<=1?"#d97706":"#374151"}">${est}</td>
      <td>${st}</td>
    </tr>`;
  }).join("");
  return`
    <h2>🤝 Consignação</h2>
    <p class="sub">${parc.length} parceiros · Fechamento dia 30</p>
    <div class="fbar">
      ${["todos",...parc].map(p=>`<button class="fbtn${sel===p?" on":""}" onclick="S.consigSel='${p}';render()">${p==="todos"?"Todos":p}</button>`).join("")}
    </div>
    <div class="ccards">
      ${[["Em consignação (AD)",R(totAD),"#4f46e5"],["Já vendido",R(totV),"#16a34a"],["Estoque total",totE+" un.","#d97706"]].map(([l,v,c])=>`<div class="ccard" style="border-top:3px solid ${c}"><div class="kl">${l}</div><div class="cv" style="color:${c}">${v}</div></div>`).join("")}
    </div>
    <div class="twrap"><div class="tscroll">
      <table><thead><tr>${["Parceiro","Produto","Cor","Qtd","P.AD","P.Sug.","Vendido","Estoque","Status"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows||`<tr><td colspan="9" style="padding:28px;text-align:center;color:#9ca3af">Sem dados</td></tr>`}</tbody></table>
    </div></div>
  `;
}

// ─── APP PARCEIRO ─────────────────────────────────────────────────────────────
function pgParceiro(){
  const parc=S.parcSel;
  const est=S.consig.filter(c=>(c.Local||"")===parc&&N(c["Estoque Atual"])>0);
  const f=S.vendaForm;
  // Cards de resumo do parceiro
  const totAD=est.reduce((s,c)=>s+N(c["Preço AD"])*N(c.Quantidade),0);
  const totVend=est.reduce((s,c)=>s+N(c["Preço AD"])*N(c["Quantidade Vendida"]),0);
  const totEst=est.reduce((s,c)=>s+N(c["Estoque Atual"]),0);
  const qtdVend=est.reduce((s,c)=>s+N(c["Quantidade Vendida"]),0);
  // Histórico mensal
  const pm={};
  S.pedidos.filter(p=>p.Pago==="Sim"&&(p.Pessoa||"").toLowerCase().includes(parc.toLowerCase().split(" ")[0])).forEach(p=>{
    const d=fmtDate(p["Data Venda"]||"");if(!d||d.length<7)return;
    const m=new Date(d).getMonth();
    if(!pm[m])pm[m]={tot:0,qtd:0};
    pm[m].tot+=N(p["Valor Recebido"])||N(p.Valor);
    pm[m].qtd+=N(p.Qtdd)||1;
  });
  const me=Object.entries(pm);
  const mx=Math.max(...me.map(([,v])=>v.tot),1);
  const opts=S.lC?`<option disabled>Carregando...</option>`:est.map(c=>`<option value="${c.Impressão||""}">${c.Impressão} — ${c.Cor} (est: ${N(c["Estoque Atual"])})</option>`).join("");
  const regVendas=S.vendas.slice(0,4).map(v=>`<div class="vreg"><span style="font-weight:600">${v.impressao}</span><span style="color:#16a34a;font-weight:700">×${v.qtd} · ${v.data}</span></div>`).join("");
  const stItems=est.length?est.map(c=>{
    const e=N(c["Estoque Atual"]),vd=N(c["Quantidade Vendida"]);
    return`<div class="si" style="background:${e<=2?"#fffbeb":"#f9fafb"};${e<=2?"border:1px solid #fcd34d":""}">
      <div class="si-name"><div class="n">${c.Impressão||""}</div><div class="s">${c.Cor||""}</div></div>
      <div class="si-pill" style="background:${e<=2?"#fef3c7":"#f0fdf4"}"><div class="pv" style="color:${e<=2?"#d97706":"#16a34a"}">${e}</div><div class="pl">estoque</div></div>
      <div class="si-pill" style="background:#eef2ff"><div class="pv" style="color:#4f46e5;font-size:14px">${vd}</div><div class="pl">vendido</div></div>
      <div class="si-pill" style="background:#f0fdf4"><div class="pv" style="color:#15803d;font-size:13px">${R(N(c["Preço AD"]))}</div><div class="pl">preço AD</div></div>
      <div class="si-pill" style="background:#ede9fe"><div class="pv" style="color:#5b21b6;font-size:13px">${R(N(c["Preço Sugerido"]))}</div><div class="pl">p. sugerido</div></div>
    </div>`;
  }).join(""):`<div style="padding:24px;text-align:center;color:#9ca3af;font-size:13px">Sem estoque para este parceiro</div>`;
  return`
    <div class="ph"><div class="pre">Portal do Parceiro</div><h2>${parc}</h2><p>Registre as vendas · Fechamento dia 30 · PIX: 376.844.548-89</p></div>
    <div class="fbar">${Object.keys(S.parceiros).map(p=>`<button class="fbtn${parc===p?" on":""}" onclick="S.parcSel='${p}';S.vendas=[];render()">${p}</button>`).join("")}</div>
    <div class="ccards">
      ${[["Em consignação",R(totAD),"#4f46e5"],["Já vendido",R(totVend),"#16a34a"],["Estoque",totEst+" un.","#d97706"],["Qtd vendida",qtdVend+" peças","#7c3aed"]].map(([l,v,c])=>`<div class="ccard" style="border-top:3px solid ${c}"><div class="kl">${l}</div><div class="cv" style="color:${c}">${v}</div></div>`).join("")}
    </div>
    ${me.length?`<div class="chart" style="margin-bottom:16px"><h3>📈 Histórico de Vendas — ${parc}</h3><div class="bars">${me.map(([m,v])=>`<div class="bc"><div class="bv">${v.qtd}un</div><div class="bar" style="height:${(v.tot/mx)*75}px"></div><div class="bl">${MESES[+m]}</div></div>`).join("")}</div><div style="display:flex;gap:16px;font-size:12px;color:#6b7280;border-top:1px solid #f3f4f6;padding-top:8px;margin-top:8px"><span>Total: <strong style="color:#4f46e5">${R(me.reduce((s,[,v])=>s+v.tot,0))}</strong></span><span>Peças: <strong style="color:#7c3aed">${me.reduce((s,[,v])=>s+v.qtd,0)}</strong></span></div></div>`:`<div class="card" style="margin-bottom:16px;text-align:center;color:#9ca3af;font-size:13px;padding:20px">Sem histórico registrado para este parceiro</div>`}
    <div class="parc-layout">
      <div class="card">
        <h3 style="margin-bottom:16px">📝 Registrar Venda</h3>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div><label class="flbl">Produto *</label>
            <select class="fsel" onchange="S.vendaForm.impressao=this.value"><option value="">Selecione...</option>${opts}</select></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label class="flbl">Quantidade *</label><input class="finp" type="number" min="1" value="${f.qtd}" onchange="S.vendaForm.qtd=+this.value"/></div>
            <div><label class="flbl">Data *</label><input class="finp" type="date" value="${f.data}" onchange="S.vendaForm.data=this.value"/></div>
          </div>
          <div><label class="flbl">Cliente</label><input class="finp" type="text" value="${f.cliente||""}" placeholder="Nome (opcional)" oninput="S.vendaForm.cliente=this.value"/></div>
          <button id="vbtn" class="btn-pri" style="width:100%;padding:11px" onclick="registrarVenda()">Confirmar Venda</button>
        </div>
        ${S.vendas.length?`<div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:7px">Registradas nesta sessão:</div>${regVendas}</div>`:""}
        <div class="pixbox"><strong style="color:#15803d">💰 Fechamento Mensal</strong><br>Todo dia 30 · PIX: <strong>376.844.548-89</strong><br>Eduardo Perez Marcelo · Bradesco</div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:6px">📦 Estoque + Preços</h3>
        <div style="font-size:11px;color:#9ca3af;margin-bottom:12px">Estoque atual · Vendido · Preço AD · Preço sugerido</div>
        ${S.lC?load("Carregando..."):stItems}
      </div>
    </div>
  `;
}

async function registrarVenda(){
  const f=S.vendaForm;
  if(!f.impressao||!f.qtd){alert("Selecione produto e quantidade.");return;}
  const btn=document.getElementById("vbtn");
  if(btn){btn.textContent="Salvando...";btn.style.background="#9ca3af";btn.disabled=true;}
  const parc=S.parcSel;
  const sid=S.parceiros[parc];
  const item=S.consig.find(c=>(c.Local||"")===parc&&(c.Impressão||"")===f.impressao);
  const pAD=N(item?.["Preço AD"]||0);
  const row=[`${f.impressao}${item?.Cor||""}`,f.impressao,item?.Cor||"",N(f.qtd),f.data,f.cliente||"","","",pAD,pAD*N(f.qtd),"",+(pAD*1.3).toFixed(2),+((pAD*1.3)*N(f.qtd)).toFixed(2),+((pAD*.3)*N(f.qtd)).toFixed(2)];
  try{
    await appendSheet(sid,"Histórico de Vendas!A:N",row);
    S.vendas.unshift({...f,id:Date.now()});
    S.vendaForm={impressao:"",qtd:1,data:today(),cliente:""};
    if(btn){btn.textContent="✅ Gravado na planilha!";btn.style.background="#16a34a";}
    setTimeout(()=>render(),1500);
  }catch(e){
    alert("Erro: "+e.message+"\n\nA planilha do parceiro precisa estar com permissão de edição.");
    if(btn){btn.textContent="Confirmar Venda";btn.style.background="#4f46e5";btn.disabled=false;}
  }
}

function pgGerenciar(){
  const lista=Object.entries(S.parceiros).map(([nome,id])=>`

      <button onclick="removerParceiro('${nome}')" style="padding:4px 10px;border-radius:7px;border:none;background:#fee2e2;color:#991b1b;font-weight:700;cursor:pointer;font-size:11px;font-family:inherit">Remover</button>
    </div>`).join("");
  return`

    <p class="sub">Adicione ou remova parceiros de consignação</p>

    <div class="card">
      <h3 style="margin-bottom:14px">➕ Adicionar Novo Parceiro</h3>
      <div style="background:#fef3c7;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:12px;color:#92400e">
        1. Duplique uma planilha de parceiro no Google Drive<br>
        2. Compartilhe como "Qualquer pessoa com o link pode visualizar"<br>
        3. Cole o ID da nova planilha abaixo
      </div>
      <div class="fgrid">
        <div><label class="flbl">Nome do Parceiro *</label><input id="np-n" class="finp" placeholder="Ex: Loja da Maria"/></div>
        <div><label class="flbl">ID da Planilha *</label><input id="np-i" class="finp" placeholder="1BxrGwTV535..."/></div>
      </div>
      <button onclick="adicionarParceiro()" class="btn-pri" style="margin-top:14px">Salvar Parceiro</button>
    </div>

}
function adicionarParceiro(){
  const nome=document.getElementById("np-n")?.value?.trim();
  const id=document.getElementById("np-i")?.value?.trim();
  if(!nome||!id){alert("Preencha nome e ID.");return;}
  const m=id.match(/\/d\/([a-zA-Z0-9_-]+)/);
  S.parceiros[nome]=m?m[1]:id;
  localStorage.setItem("amalello_parc",JSON.stringify(S.parceiros));
  alert(`Parceiro "${nome}" adicionado!`);render();
}
function removerParceiro(nome){
  if(!confirm(`Remover "${nome}"?`))return;
  delete S.parceiros[nome];
  localStorage.setItem("amalello_parc",JSON.stringify(S.parceiros));
  render();
}
