<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_KEY  = "AIzaSyALhdkEqgIVaW9wbWRpyDnB0ZEV2BFyrds";

const PARCEIROS = {
  "Planet Kids Hair": "1-J32HhuPd0b3H8mKgkuB0APblydt8CwV0R82XECUoZU",
  "Ateliê Telma":     "1ZvloqW_edvgSLBp-5065D_c7XFElB9NEeQJra8NXCOA",
  "Bomboniere Lucia": "19ucXwNDz_x2yrrciinau6byMT-YLwmCfq6wnwr783N8",
  "Loja Big Net":     "1qVLvSQ2OiRE7VAhlz8uVb44FIiekDuDn2Fjd1cOKNVA",
  "Zancapel":         "1deStJmPAjBJhXoyh4qNtLXul_MCKbKAggVOzTEqRO6k",
};
const INVEST = {Equipamentos:6500,Instrumentos:251.03,Insumos:478.31,Filamentos:3803.06};
const TOT_INV = Object.values(INVEST).reduce((a,b)=>a+b,0);
const COR_TIPO = {Chaveiro:"#7c3aed",Caixa:"#d97706",Vaso:"#059669",Utilidade:"#2563eb",Fidget:"#db2777","Estátua":"#9333ea",Brinquedo:"#dc2626",Letreiro:"#0891b2",Outros:"#6b7280",Enfeite:"#16a34a"};
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let STATE = {
  pag:"dashboard", pedidos:[], skus:[], consig:[],

function today(){return new Date().toISOString().slice(0,10);}

// ─── CUSTEIO ─────────────────────────────────────────────────────────────────
function calcCusto(g,h,chav=false){
  const CFG=+g*0.08844, TD=CFG*0.1, CEE=+h*0.88, DEP=+h*1.0, ad=chav?0.3681:0;
  return {CFG,TD,CEE,DEP,ad,tot:CFG+TD+CEE+DEP+ad};
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const R = n=>`R$\u00a0${(parseNum(n)||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}`;

// Parser robusto para números brasileiros (vírgula como decimal)
function parseNum(v){
  if(v===null||v===undefined||v==="") return 0;
  if(typeof v==="number") return v;
  const s=String(v).trim().replace(/[R$\s]/g,"");
  if(!s) return 0;
  // formato brasileiro: 1.234,56
  if(s.includes(",")&&s.includes(".")){
    return parseFloat(s.replace(/\./g,"").replace(",","."));
  }
  // só vírgula: 1234,56
  if(s.includes(",")&&!s.includes(".")){
    return parseFloat(s.replace(",","."));
  }
  return parseFloat(s)||0;
}
const P = n=>`${((+n||0)*100).toFixed(1)}%`;
function serial2date(s){
  if(!s||s==="") return "";
  // already a date string like "2026-03-01" or "01/03/2026"
  if(typeof s==="string"){
    const sT=s.trim();
    if(/^\d{4}-\d{2}-\d{2}/.test(sT)) return sT.slice(0,10);
    // dd/mm/yyyy
    if(/^\d{2}\/\d{2}\/\d{4}/.test(sT)){
      const [d,m,y]=sT.split("/");
      return `${y}-${m}-${d}`;
    }
    // "11-mar" or "11 mar" style
    const mNames=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
    const mMatch=sT.toLowerCase().match(/(\d{1,2})[\s\-]([a-z]{3})/);
    if(mMatch){
      const day=mMatch[1].padStart(2,"0");
      const mIdx=mNames.indexOf(mMatch[2]);
      if(mIdx>=0) return `2026-${String(mIdx+1).padStart(2,"0")}-${day}`;
    }
  }
  const n=+s; 
  if(isNaN(n)||n<1) return "";
  return new Date((n-25569)*86400*1000).toISOString().slice(0,10);
}
function rows2obj(rows){
  if(!rows||rows.length<2) return [];
  const h=rows[0];
  return rows.slice(1).filter(r=>r.some(c=>c!=="")).map(r=>{
    const o={};
    h.forEach((k,j)=>{ if(k) o[k.trim()]=r[j]??""; });
    // converte valores numéricos brasileiros
    ["Valor","Valor Recebido","Preço unitário","Qtdd","Filamento (gramas)","Tempo (h)","Preço AD","Preço Sugerido","Quantidade","Quantidade Vendida","Estoque Atual","FilamentoUnitario","TempoemHora"].forEach(k=>{
      if(o[k]!==undefined) o[k]=parseNum(o[k]);
    });
    // aliases para colunas com nomes que variam
    const alias=(keys,fallback)=>{for(const k of keys){if(o[k]!==undefined&&o[k]!=="")return;}  o[keys[0]]=fallback||"";};
    // Data
    if(!o["Data Venda"]||o["Data Venda"]===""){
      o["Data Venda"]=o["Data Ve nda"]||o["Data"]||o["data"]||"";
    }
    // Coluna L(11)=Qtdd, M(12)=Valor(total), N(13)=Valor Recebido, O(14)=Preço unitário
    if((!o["Valor"]||o["Valor"]==="0"||o["Valor"]==="")&&r[12]){
      o["Valor"]=r[12]; // coluna M = Valor total potencial
    }
    if(!o["Valor Recebido"]||o["Valor Recebido"]===""){
      o["Valor Recebido"]=r[13]||"0"; // coluna N = o que já recebemos
    }
    // Preço unitário (coluna L+1 = index 11 é Qtdd, próximo é preço)
    if(!o["Preço unitário"]||o["Preço unitário"]===""){
      o["Preço unitário"]=r[11]||"0";
    }
    // Qtd (coluna L = index 11)
    if(!o["Qtdd"]||o["Qtdd"]===""){
      o["Qtdd"]=r[11]||"1";
    }
    // Filamento (coluna P = index 15)
    if(!o["Filamento (gramas)"]||o["Filamento (gramas)"]===""){
      o["Filamento (gramas)"]=r[15]||o["FilamentoUnitario"]||"0";
    }
    // Tempo (coluna Q = index 16)  
    if(!o["Tempo (h)"]||o["Tempo (h)"]===""){
      o["Tempo (h)"]=r[16]||o["TempoemHora"]||"0";
    }
    return o;
  });
}
async function gsheet(id,range){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const res=await fetch(url);
  if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||"Erro API Sheets");}
  return (await res.json()).values||[];
}

// ─── CARREGAR DADOS ───────────────────────────────────────────────────────────
async function loadPedidos(){
  STATE.loadP=true; STATE.erroP=null; render();
  try{STATE.pedidos=rows2obj(await gsheet(SHEET_ID,"Pedidos!A:AB"));STATE.att=new Date().toLocaleTimeString("pt-BR");}
  catch(e){STATE.erroP=e.message;}
  STATE.loadP=false; render();
}
async function loadSkus(){
  STATE.loadS=true; STATE.erroS=null; render();
  try{STATE.skus=rows2obj(await gsheet(SKU_SHEET_ID,"Controle de Skus!A:G"));}
  catch(e){STATE.erroS=e.message;}

}
async function loadConsig(){
  STATE.loadC=true; STATE.erroC=null; render();
  try{STATE.consig=rows2obj(await gsheet(SHEET_ID,"Consignado!A:M"));}

function syncAll(){loadPedidos();loadSkus();loadConsig();}

function render(){

function renderDashboard(){
  if(STATE.loadP) return loading("Buscando pedidos na planilha...");

  const ok=ped.filter(p=>p.Realizado==="Sim"&&p.Entregue==="Sim"&&p.Pago==="Sim");
  const vOK=ok.reduce((s,p)=>s+(parseNum(p["Valor Recebido"])||parseNum(p.Valor)||0),0);
  const pot=ped.filter(p=>p.Realizado==="Sim"&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não");
  const vPot=pot.reduce((s,p)=>s+(parseNum(p.Valor)||0),0);
  const saldo=vSaldoFinal-TOT_INV;
  const pay=Math.min((vOK/TOT_INV)*100,100);
  const aP=ped.filter(p=>p.Realizado!=="Sim"&&p.Realizado!=="Lead"!==false).length;
  const aE=ped.filter(p=>p.Realizado==="Sim"&&p.Entregue==="Não").length;

    <p class="subtitle">${ped.length} pedidos carregados${STATE.att?` · Atualizado ${STATE.att}`:""}</p>
    <div class="payback-box" style="background:${posOp?"#f0fdf4":"#fef2f2"};border-color:${posOp?"#bbf7d0":"#fecaca"}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800;font-size:14px;color:${posOp?"#15803d":"#b91c1c"}">${posOp?"✅ Operação POSITIVA":"⚠️ Operação ainda NEGATIVA"}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px">Investido: ${R(TOT_INV)} · Saldo Final: ${R(vSaldoFinal)} · Resultado: <strong style="color:${posOp?"#15803d":"#b91c1c"}">${R(saldo)}</strong></div>
        </div>
        <div style="font-size:22px;font-weight:900;color:${posOp?"#15803d":"#b91c1c"}">${pay.toFixed(0)}%</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pay}%;background:${posOp?"#16a34a":"#ef4444"}"></div></div>
      <div style="font-size:11px;color:#9ca3af">Payback: ${pay.toFixed(1)}% do investimento recuperado</div>
    </div>
    <div class="kpi-grid">
      ${kpi("Valor Total de Vendas",R(vTotalVendas),"Col.M sem Brinde/Consig","#4f46e5")}
      ${kpi("Já Recebido (OK)",R(vOK),`${ok.length} pedidos confirmados`,"#16a34a")}
      ${kpi("A Receber (Check)",R(vPot),`${pot.length} pendentes`,"#d97706")}
      ${kpi("Consignação (AD)",R(vConsig),"Vendido nos parceiros","#7c3aed")}
      ${kpi("Saldo Final",R(vSaldoFinal),"Vendas + Consignação","#0891b2")}
      ${kpi("Total Investido",R(TOT_INV),"Equip+Filam+Insumos","#ef4444")}
    </div>
    <div class="action-grid">
      <div class="action-card" style="background:#fef2f2"><div class="num" style="color:#dc2626">${aP}</div><div class="lbl" style="color:#dc2626">🖨️ Produzir</div></div>
      <div class="action-card" style="background:#fffbeb"><div class="num" style="color:#d97706">${aE}</div><div class="lbl" style="color:#d97706">📦 Entregar</div></div>
      <div class="action-card" style="background:#f5f3ff"><div class="num" style="color:#7c3aed">${aC}</div><div class="lbl" style="color:#7c3aed">💸 Cobrar</div></div>
    </div>
    ${me.length?`<div class="chart-box"><h3>Faturamento confirmado por mês (pedidos OK)</h3><div class="bars">${me.map(([m,v])=>`<div class="bar-col"><div class="val">${R(v).replace("R$\u00a0","")}</div><div class="bar" style="height:${(v/mx)*78}px"></div><div class="lbl">${MESES[+m]}</div></div>`).join("")}</div></div>`:""}
  `;
}

// ─── PEDIDOS ─────────────────────────────────────────────────────────────────
function renderPedidos(filter){
  if(STATE.loadP) return loading("Carregando pedidos...");
  if(STATE.erroP) return erro(STATE.erroP,"loadPedidos");
  const titulo={produzir:"🖨️ A Produzir",entregar:"📦 A Entregar",cobrar:"💸 A Cobrar"}[filter]||"📋 Todos os Pedidos";
  const b=STATE.busca.toLowerCase();
  const fil=STATE.pedidos.filter(p=>{
    const bm=!b||(p.Pessoa||"").toLowerCase().includes(b)||(p.Impressão||"").toLowerCase().includes(b);
    if(filter==="produzir") return bm&&p.Realizado!=="Sim";
    if(filter==="entregar") return bm&&p.Realizado==="Sim"&&p.Entregue==="Não";
    if(filter==="cobrar")   return bm&&(p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não";
    return bm;
  });
  const totV=fil.reduce((s,p)=>s+(parseNum(p.Valor)||0),0);
  const totR=fil.filter(p=>p.Pago==="Sim").reduce((s,p)=>s+(parseNum(p.Valor)||0),0);
  function bt(p){
    if(p.Realizado==="Lead") return tag("Lead","blue");
    if(p.Realizado!=="Sim")  return tag("Produzir","red");
    if(p.Entregue==="Não")   return tag("Entregar","yellow");
    if(p.Pago==="Não")       return tag("Cobrar","purple");
    if(p.Pago==="Brinde")    return tag("Brinde","orange");
    return tag("OK ✓","green");
  }
  const rows=fil.map((p,i)=>{
    const dt=serial2date(p["Data Venda"]||"").slice(5);
    return`<tr>
      <td style="color:#6b7280">${dt}</td>
      <td style="font-weight:600;color:#111827;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.Pessoa||""}</td>
      <td style="max-width:135px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.Impressão||""}</td>
      <td style="color:#6b7280">${p.Familia||""}</td>
      <td style="color:#6b7280">${p.Cor||""}</td>
      <td style="text-align:center;font-weight:700">${p.Qtdd||1}</td>
      <td style="font-weight:800;color:#4f46e5">${R(parseNum(p.Valor))}</td>
      <td style="font-weight:700;color:${parseNum(p["Valor Recebido"])>0?"#16a34a":"#9ca3af"}">${R(parseNum(p["Valor Recebido"]))}</td>
      <td>${tag(p.Realizado||"?",p.Realizado==="Sim"?"green":p.Realizado==="Lead"?"blue":"red")}</td>
      <td>${tag(p.Entregue||"?",p.Entregue==="Sim"?"green":p.Entregue==="Consignado"?"blue":"yellow")}</td>
      <td>${tag(p.Pago||"?",p.Pago==="Sim"?"green":p.Pago==="Brinde"?"orange":"yellow")}</td>
      <td>${bt(p)}</td>
      <td style="white-space:nowrap"><button class="edit-btn" onclick="openEditPedido(${i},'${filter||''}')">✏️ Editar</button><button class="btn" onclick="openDet(${i},'${filter||''}')">Ver</button></td>
    </tr>`;
  }).join("");
  return`
    <h2>${titulo}</h2>
    <p class="subtitle">${fil.length} pedido(s) · ${R(totV)}</p>
    <div style="display:flex;gap:10px;margin-bottom:12px"><input class="search-box" style="margin:0;flex:1" placeholder="Buscar cliente ou produto..." value="${STATE.busca}" oninput="STATE.busca=this.value;render()"/><button class="add-btn" onclick="openNewPedido()">+ Novo Pedido</button></div>
    <div class="table-wrap">
      <div style="overflow-x:auto">
        <table><thead><tr>${["Data","Cliente","Produto","Fam.","Cor","Qtd","Valor","Recebido","Realiz.","Entreg.","Pago","Status",""].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${rows||`<tr><td colspan="12" class="empty">Nenhum pedido encontrado</td></tr>`}</tbody></table>
      </div>
    </div>
    <div class="totals">
      <span>Total: <strong style="color:#4f46e5">${R(totV)}</strong></span>
      <span>Recebido: <strong style="color:#16a34a">${R(totR)}</strong></span>
      <span>Pendente: <strong style="color:#d97706">${R(totV-totR)}</strong></span>
    </div>
  `;
}

function openDet(i, filter){
  const fil=STATE.pedidos.filter(p=>{
    if(filter==="produzir") return p.Realizado!=="Sim";
    if(filter==="entregar") return p.Realizado==="Sim"&&p.Entregue==="Não";
    if(filter==="cobrar")   return (p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não";
    return true;
  });
  const b=STATE.busca.toLowerCase();
  const filb=fil.filter(p=>!b||(p.Pessoa||"").toLowerCase().includes(b)||(p.Impressão||"").toLowerCase().includes(b));
  STATE.detModal=filb[i];
  showModal();
}

function showModal(){
  const p=STATE.detModal; if(!p) return;
  const isC=(p.Familia||"")==="Chaveiro";
  const g=+(p["Filamento (gramas)"]||0);
  const h=+(p["Tempo (h)"]||0);
  const {CFG,TD,CEE,DEP,ad,tot}=calcCusto(g,h,isC);
  const pr=+(p["Preço unitário"]||p.Valor||0);
  const lu=pr-tot; const ma=pr>0?lu/pr:0; const fa=tot>0?pr/tot:0;
  const ok=fa>=2;
  const html=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h3>Detalhes · ${p.Impressão||""}</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="detail-grid">
        <div class="detail-box" style="background:#f9fafb">
          <div class="section-lbl" style="color:#9ca3af">Pedido</div>
          ${[["Cliente",p.Pessoa],["Data",serial2date(p["Data Venda"]||"")],["Produto",p.Impressão],["Cor",p.Cor],["Qtd",p.Qtdd||1],["Preço unit.",R(pr)],["Total",R(+(p.Valor||0))]].map(([k,v])=>`<div class="detail-row" style="border-color:#e5e7eb"><span>${k}</span><span>${v}</span></div>`).join("")}
        </div>
        <div class="detail-box" style="background:#f0fdf4">
          <div class="section-lbl" style="color:#065f46">Custo de Produção</div>
          ${[["Filamento (CFG)",R(CFG)],["Desperdício 10%",R(TD)],["Energia (CEE)",R(CEE)],["Depreciação",R(DEP)],["Adicional",R(ad)]].map(([k,v])=>`<div class="detail-row" style="border-color:#d1fae5"><span>${k}</span><span>${v}</span></div>`).join("")}
          <div class="detail-row" style="border-color:transparent;padding-top:7px;font-weight:900;font-size:13px"><span>Custo Total</span><span style="color:#dc2626">${R(tot)}</span></div>
        </div>
      </div>
      <div class="metric-grid">
        <div class="metric"><div class="lbl">Lucro/peça</div><div class="val" style="color:${lu>0?"#16a34a":"#ef4444"}">${R(lu)}</div></div>
        <div class="metric"><div class="lbl">Margem %</div><div class="val" style="color:#4f46e5">${P(ma)}</div></div>
        <div class="metric"><div class="lbl">Markup</div><div class="val" style="color:#d97706">×${fa.toFixed(2)}</div></div>
      </div>
      <div class="alert-box" style="background:${ok?"#f0fdf4":"#fef2f2"};color:${ok?"#15803d":"#b91c1c"}">
        ${ok?`✅ Markup ×${fa.toFixed(2)} — saudável (≥2×)`:`⚠️ Markup ×${fa.toFixed(2)} — abaixo do recomendado. Preço sugerido: ${R(tot*2.5)}`}
      </div>
    </div>
  </div>`;
  let overlay=document.getElementById("modal-container");
  if(!overlay){overlay=document.createElement("div");overlay.id="modal-container";document.body.appendChild(overlay);}
  overlay.innerHTML=html;
}
function closeModal(){const el=document.getElementById("modal-container");if(el)el.innerHTML="";}

  const b=STATE.busca.toLowerCase();

  const fil=STATE.skus.filter(s=>{
    const bm=!b||(s.Impressão||"").toLowerCase().includes(b);

    return bm&&tm;
  });
  const cards=fil.map(s=>{

        <div class="sku-name">${nome}</div>
        <div class="sku-meta">
          <div class="sku-meta-item" style="background:#f9fafb"><div class="lbl">Filamento</div><div class="val">${g}g</div></div>
          <div class="sku-meta-item" style="background:#f9fafb"><div class="lbl">Tempo</div><div class="val">${h}h</div></div>

          <div class="sku-meta-item" style="background:#f5f3ff"><div class="lbl">Venda (2.5×)</div><div class="val" style="color:#7c3aed">${R(tot*2.5)}</div></div>
        </div>
        <div class="sku-consig"><span style="color:#6b7280">Consignação (1.8×)</span><span style="font-weight:700;color:#15803d">${R(tot*1.8)}</span></div>
        ${s["Link Maker "]?`<a href="${s["Link Maker "]}" target="_blank" class="sku-link">MakerWorld ↗</a>`:""}
      </div>
    </div>`;
  }).join("");
  return`
    <h2>🏷️ Produtos / SKUs</h2>

      <select class="filter-sel" onchange="STATE._tipoSel=this.value;render()">
        <option value="todos">Todos os tipos</option>
        ${tipos.map(t=>`<option value="${t}"${tipoSel===t?" selected":""}>${t}</option>`).join("")}
      </select>

    <div class="sku-grid">${cards||`<div class="empty">Nenhum produto encontrado</div>`}</div>

async function registrarVenda(){
  const f=STATE.vendaForm;
  if(!f.impressao||!f.qtd){alert("Selecione o produto e a quantidade.");return;}
  const btn=document.getElementById("venda-btn");
  btn.textContent="Salvando...";btn.style.background="#9ca3af";btn.disabled=true;
  const parc=STATE.parcSel;
  const sid=PARCEIROS[parc];
  const item=STATE.consig.find(c=>(c.Local||"")===parc&&(c.Impressão||"")===f.impressao);
  const pAD=+(item?.["Preço AD"]||0);
  const row=[`${f.impressao}${item?.Cor||""}`,f.impressao,item?.Cor||"",+f.qtd,f.data,f.cliente,"","",pAD,pAD*+f.qtd,"",+(pAD*1.3).toFixed(2),+((pAD*1.3)*+f.qtd).toFixed(2),+((pAD*0.3)*+f.qtd).toFixed(2)];
  try{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent("Histórico de Vendas!A:N")}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS&key=${API_KEY}`;
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({values:[row]})});
    if(!res.ok) throw new Error("A planilha do parceiro precisa estar com permissão de edição pública.");
    STATE.vendas.unshift({...f,id:Date.now()});
    STATE.vendaForm={impressao:"",qtd:1,data:today(),cliente:""};
    btn.textContent="✅ Gravado na planilha!";btn.style.background="#16a34a";
    setTimeout(()=>render(),1500);
  }catch(e){
    alert("Atenção: "+e.message);
    btn.textContent="Confirmar Venda";btn.style.background="#4f46e5";btn.disabled=false;
  }
}

function getPedidosFiltrados(filter){

    if(filter==="cobrar")   return (p.Entregue==="Sim"||p.Entregue==="Consignado")&&p.Pago==="Não";

function closeEditModal(){
  STATE.editModal=null;
  const el=document.getElementById("modal-container");
  if(el) el.innerHTML="";
}

function salvarPedido(){
  const {mode, pedido, origIdx} = STATE.editModal;
  if(!pedido.Pessoa||!pedido["Impressão"]){alert("Preencha cliente e produto.");return;}
  // Recalcula valor
  const qtd = parseNum(pedido.Qtdd)||1;
  const preco = parseNum(pedido["Preço unitário"])||0;
  pedido.Valor = qtd * preco;
  if(pedido.Pago==="Sim" && !parseNum(pedido["Valor Recebido"])){
    pedido["Valor Recebido"] = pedido.Valor;
  }
  if(mode==="new"){
    STATE.pedidos.push(pedido);
  } else {
    STATE.pedidos[origIdx] = pedido;
  }
  closeEditModal();
  render();
  // Nota: para gravar na planilha precisaria do OAuth. Por enquanto salva localmente.
}

        2. Compartilhe como "Qualquer pessoa com o link pode visualizar"<br>
        3. Cole o ID da nova planilha abaixo (parte entre /d/ e /edit na URL)
      </div>
      <div class="form-group"><label>Nome do Parceiro *</label><input id="np-nome" type="text" placeholder="Ex: Loja da Maria"/></div>
      <div class="form-group"><label>ID da Planilha Google Sheets *</label><input id="np-id" type="text" placeholder="Ex: 1BxrGwTV535hTLv0ibZCOKYYLd7ge7bES..."/></div>
      <button onclick="adicionarParceiro()" style="padding:9px 20px;border-radius:9px;border:none;background:#4f46e5;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px">Salvar Parceiro</button>
    </div>
  `;
}

function adicionarParceiro(){
  const nome=document.getElementById('np-nome')?.value?.trim();
  const id=document.getElementById('np-id')?.value?.trim();
  if(!nome||!id){alert('Preencha o nome e o ID da planilha.');return;}
  // extrai só o ID se colarem a URL completa
  const match=id.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const sheetId=match?match[1]:id;
  PARCEIROS[nome]=sheetId;
  saveParceiros();
  alert(`Parceiro "${nome}" adicionado com sucesso!`);
  render();
}

function removerParceiro(nome){
  if(!confirm(`Remover parceiro "${nome}"?`))return;
  delete PARCEIROS[nome];
  saveParceiros();
  render();
}
